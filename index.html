  <title>TripFind – Dein Traumreise-Finder</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;height:100dvh}
    body{font-family:'DM Sans',system-ui,sans-serif;background:#080808;color:#fff;overflow:hidden;-webkit-font-smoothing:antialiased}
    ::-webkit-scrollbar{display:none}
    *{scrollbar-width:none}
    input,textarea,select{font-size:16px!important;font-family:inherit}
    button{-webkit-tap-highlight-color:transparent;font-family:inherit;cursor:pointer}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    @keyframes bounce0{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    @keyframes bounce1{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    @keyframes bounce2{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    @keyframes swipeLeft{to{transform:translateX(-120%) rotate(-20deg);opacity:0}}
    @keyframes swipeRight{to{transform:translateX(120%) rotate(20deg);opacity:0}}
    .fade-up{animation:fadeUp .35s ease forwards}
    .fade-in{animation:fadeIn .3s ease forwards}
  </style>
</head>

// ── HELPERS ──────────────────────────────────────────────────────────────────
function todayPlus(d){const dt=new Date();dt.setDate(dt.getDate()+d);return dt.toISOString().split("T")[0];}
function formatPrice(n){return new Intl.NumberFormat("de-DE",{maximumFractionDigits:0}).format(n)+" €";}
function formatTime(iso){if(!iso)return"--:--";return new Date(iso).toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"});}

function buildSkyscannerUrl(origin,dest,dep,ret){
  const d1=dep.replace(/-/g,"").slice(2),d2=ret.replace(/-/g,"").slice(2);
  return `https://www.skyscanner.de/transport/fluge/${origin.toLowerCase()}/${dest.toLowerCase()}/${d1}/${d2}/?adults=1`;
}
function buildBookingUrl(dest,checkIn,checkOut){
  return `https://www.booking.com/searchresults.de.html?ss=${encodeURIComponent(dest)}&checkin=${checkIn}&checkout=${checkOut}`;
}
function buildGetYourGuideUrl(dest){
  return `https://www.getyourguide.de/${dest.toLowerCase().replace(/ /g,"-")}-l/`;
}

// ── WEATHER API ───────────────────────────────────────────────────────────────
async function fetchWeather(iata,dateStr){
  const coords=DEST_COORDS[iata];
  if(!coords)return null;
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto&start_date=${dateStr}&end_date=${dateStr}`;
    const res=await fetch(url);
    const data=await res.json();
    const max=Math.round(data.daily?.temperature_2m_max?.[0]||0);
    const min=Math.round(data.daily?.temperature_2m_min?.[0]||0);
    const code=data.daily?.weathercode?.[0]||0;
    const emoji=code===0?"☀️":code<=3?"🌤":code<=48?"🌥":code<=67?"🌧":code<=77?"❄️":"⛈";
    return{max,min,emoji};
  }catch{return null;}
}

// ── AI SEARCH ─────────────────────────────────────────────────────────────────
async function searchTripsWithAI(profile){
  const res=await fetch("/api/search",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(profile)
  });
  const data=await res.json();
  if(data.error)throw new Error(data.error);
  return data.trips;
}

// ── USER PREFERENCES (AI Learning) ───────────────────────────────────────────
function loadPrefs(){try{return JSON.parse(localStorage.getItem("tf_prefs")||"{}")}catch{return{}}}
function savePrefs(p){try{localStorage.setItem("tf_prefs",JSON.stringify(p))}catch{}}
function learnFromLike(dest,tags){
  const p=loadPrefs();
  p.liked=p.liked||[];
  p.likedTags=p.likedTags||{};
  if(!p.liked.includes(dest.iata))p.liked.push(dest.iata);
  (tags||[]).forEach(t=>{p.likedTags[t]=(p.likedTags[t]||0)+1;});
  savePrefs(p);
}
function learnFromDislike(dest){
  const p=loadPrefs();
  p.disliked=p.disliked||[];
  if(!p.disliked.includes(dest.iata))p.disliked.push(dest.iata);
  savePrefs(p);
}

// ── TOAST ────────────────────────────────────────────────────────────────────
function Toast({msg,type,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,3000);return()=>clearTimeout(t);},[]);
  const bg={success:TH.accentLight,error:TH.redLight,info:TH.blueLight,warning:TH.amberLight}[type]||TH.accentLight;
  const c={success:TH.accent,error:TH.red,info:TH.blue,warning:TH.amber}[type]||TH.accent;
  return(
    <div style={{position:"fixed",bottom:80,left:16,right:16,background:bg,border:`1px solid ${c}44`,borderRadius:14,padding:"14px 18px",color:c,fontSize:14,fontWeight:600,zIndex:400,boxShadow:TH.shadowLg,textAlign:"center"}}>
      {msg}
    </div>
  );
}

// ── SWIPE CARDS ───────────────────────────────────────────────────────────────
function SwipeCards({onLike,onDislike,onDone}){
  const [cards,setCards]=useState(SWIPE_DESTINATIONS);
  const [current,setCurrent]=useState(0);
  const [anim,setAnim]=useState(null);
  const prefs=loadPrefs();

  const handleSwipe=(liked)=>{
    const dest=cards[current];
    setAnim(liked?"right":"left");
    setTimeout(()=>{
      if(liked){onLike(dest);learnFromLike(dest,dest.tags);}
      else{onDislike(dest);learnFromDislike(dest);}
      setAnim(null);
      if(current>=cards.length-1){onDone();}
      else{setCurrent(c=>c+1);}
    },350);
  };

  if(current>=cards.length)return null;
  const dest=cards[current];
  const img=DEST_IMAGES[dest.iata]||DEST_IMAGES.default;

  return(
    <div style={{padding:"0 16px 16px"}}>
      <div style={{fontSize:13,color:TH.mute,textAlign:"center",marginBottom:12}}>
        {current+1} / {cards.length} · Swipen oder tippen
      </div>
      <div style={{
        position:"relative",borderRadius:20,overflow:"hidden",height:380,
        boxShadow:TH.shadowLg,
        animation:anim?`swipe${anim==="right"?"Right":"Left"} .35s ease forwards`:"none",
        cursor:"grab"
      }}>
        <img src={img} style={{width:"100%",height:"100%",objectFit:"cover"}} alt={dest.dest}/>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,transparent 40%,rgba(0,0,0,0.9))"}}/>
        <div style={{position:"absolute",top:12,right:12,background:"rgba(0,0,0,0.6)",borderRadius:20,padding:"4px 10px",fontSize:13,color:"#fff",fontWeight:600}}>
          {dest.temp}
        </div>
        <div style={{position:"absolute",bottom:0,left:0,right:0,padding:20}}>
          <div style={{fontSize:24,fontWeight:800,color:"#fff",marginBottom:4}}>{dest.dest}</div>
          <div style={{fontSize:14,color:"rgba(255,255,255,0.7)",marginBottom:10}}>{dest.country}</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {dest.tags.map(t=>(
              <span key={t} style={{background:"rgba(255,255,255,0.2)",borderRadius:20,padding:"4px 10px",fontSize:12,color:"#fff"}}>{t}</span>
            ))}
          </div>
        </div>
      </div>
      <div style={{display:"flex",gap:16,marginTop:16}}>
        <button onClick={()=>handleSwipe(false)} style={{flex:1,height:56,background:TH.redLight,border:`1px solid ${TH.red}44`,borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",gap:8,fontSize:15,fontWeight:700,color:TH.red}}>
          <Icon name="x" size={20} color={TH.red}/> Nicht so
        </button>
        <button onClick={()=>handleSwipe(true)} style={{flex:1,height:56,background:TH.accentLight,border:`1px solid ${TH.accentBorder}`,borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",gap:8,fontSize:15,fontWeight:700,color:TH.accent}}>
          <Icon name="heartFill" size={20} color={TH.accent}/> Gefällt mir
        </button>
      </div>
      <button onClick={onDone} style={{width:"100%",marginTop:10,background:"transparent",border:`1px solid ${TH.border}`,borderRadius:12,padding:"10px",fontSize:13,color:TH.mute}}>
        Überspringen → direkt zur Suche
      </button>
    </div>
  );
}

// ── QUIZ ONBOARDING ───────────────────────────────────────────────────────────

  const [step,setStep]=useState(0);
  const [profile,setProfile]=useState({
    traveler:"Solo",airport:"MUC",duration:"4 Tage",
    dateFrom:todayPlus(7),dateTo:todayPlus(11),
    budget:500,hotel:"hotel3",vibes:[],activity:[],
    style:"",climate:"",region:"",excl:"",flightPref:"",
    personality:"",tripType:"",
  });

  function upd(k,v){setProfile(p=>({...p,[k]:v}));}
  function toggleArr(k,v){
    setProfile(p=>{
      const a=p[k]||[];
      return{...p,[k]:a.includes(v)?a.filter(x=>x!==v):[...a,v]};
    });
  }

  const QUIZ_STEPS=[
    {title:"Wer reist mit dir?",sub:"Das beeinflusst alle Vorschläge",type:"traveler"},
    {title:"Eher Strand oder Berge?",sub:"Wähle deinen Traumurlaubs-Typ",type:"personality"},
    {title:"Von wo und wann?",sub:"Abflughafen und Zeitraum",type:"logistics"},
    {title:"Was ist dein Reisestil?",sub:"Wie reist du am liebsten?",type:"style"},
    {title:"Was willst du erleben?",sub:"Mehrere möglich",type:"activities"},
    {title:"Budget & Unterkunft",sub:"Was passt zu dir?",type:"budget"},
    {title:"Feintuning",sub:"Letzte Details für perfekte Treffer",type:"fine"},
    {title:"Dein Traumreise-Profil",sub:"Alles auf einen Blick",type:"summary"},
  ];

  const ACTIVITIES=[
    {icon:"🏖",label:"Strand & Meer"},{icon:"🥾",label:"Wandern & Natur"},
    {icon:"🏛",label:"Kultur & Museen"},{icon:"🍕",label:"Essen & Kulinarik"},
    {icon:"🎉",label:"Nightlife & Party"},{icon:"🧘",label:"Wellness & Spa"},
    {icon:"🚵",label:"Abenteuer & Sport"},{icon:"🛍",label:"Shopping"},
    {icon:"📸",label:"Fotografie & Sightseeing"},{icon:"🎭",label:"Events & Festivals"},
    {icon:"🏊",label:"Wassersport"},{icon:"🍷",label:"Wein & Genuss"},
  ];

  const PERSONALITIES=[
    {id:"beach",emoji:"🏖",label:"Strand & Sonne",desc:"Entspannen, Meer, Wärme"},
    {id:"mountain",emoji:"🏔",label:"Berge & Natur",desc:"Wandern, frische Luft, Abenteuer"},
    {id:"city",emoji:"🏙",label:"Städtetrip",desc:"Kultur, Restaurants, Nightlife"},
    {id:"mix",emoji:"🌍",label:"Abwechslung",desc:"Von allem etwas"},
  ];

  const STYLES=[
    {id:"budget",emoji:"💰",label:"Budget",desc:"Günstig & authentisch"},
    {id:"comfort",emoji:"✨",label:"Komfort",desc:"Gutes Preis-Leistungs-Verhältnis"},
    {id:"luxury",emoji:"👑",label:"Luxus",desc:"Das Beste vom Besten"},
    {id:"adventure",emoji:"🧗",label:"Abenteuer",desc:"Raus aus der Komfortzone"},
    {id:"culture",emoji:"🎭",label:"Kultur",desc:"Geschichte & lokales Leben"},
  ];

  const isLast=step===QUIZ_STEPS.length-1;
  const prog=Math.round(((step+1)/QUIZ_STEPS.length)*100);
  const currentStep=QUIZ_STEPS[step];

  const renderStep=()=>{
    if(currentStep.type==="traveler") return(
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {[["Solo","🧳","Nur ich"],["Zu zweit","💑","Romantiktrip"],["Gruppe","👥","3-6 Personen"],["Familie","👨‍👩‍👧","Mit Kindern"]].map(([label,emoji,desc])=>(
          <div key={label} onClick={()=>upd("traveler",label)} style={{background:profile.traveler===label?TH.accentLight:TH.surfaceAlt,border:`2px solid ${profile.traveler===label?TH.accent:TH.border}`,borderRadius:16,padding:"20px 12px",cursor:"pointer",textAlign:"center"}}>
            <div style={{fontSize:32,marginBottom:8}}>{emoji}</div>
            <div style={{fontSize:14,fontWeight:700,color:profile.traveler===label?TH.accent:TH.text}}>{label}</div>
            <div style={{fontSize:11,color:TH.mute,marginTop:3}}>{desc}</div>
          </div>
        ))}
      </div>
    );

    if(currentStep.type==="personality") return(
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {PERSONALITIES.map(p=>(
          <div key={p.id} onClick={()=>upd("personality",p.id)} style={{display:"flex",alignItems:"center",gap:16,background:profile.personality===p.id?TH.accentLight:TH.surfaceAlt,border:`2px solid ${profile.personality===p.id?TH.accent:TH.border}`,borderRadius:16,padding:"16px 18px",cursor:"pointer"}}>
            <span style={{fontSize:32}}>{p.emoji}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:700,color:profile.personality===p.id?TH.accent:TH.text}}>{p.label}</div>
              <div style={{fontSize:12,color:TH.mute,marginTop:2}}>{p.desc}</div>
            </div>
            {profile.personality===p.id&&<Icon name="check" size={20} color={TH.accent}/>}
          </div>
        ))}
      </div>
    );

    if(currentStep.type==="logistics") return(
      <div>
        <div style={{fontSize:12,color:TH.mute,marginBottom:8,fontWeight:600,textTransform:"uppercase"}}>Abflughafen</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
          {AIRPORTS.map(a=>(
            <div key={a.code} onClick={()=>upd("airport",a.code)} style={{background:profile.airport===a.code?TH.accentLight:TH.surfaceAlt,border:`1px solid ${profile.airport===a.code?TH.accent:TH.border}`,borderRadius:20,padding:"7px 14px",cursor:"pointer",fontSize:13,color:profile.airport===a.code?TH.accent:TH.sub,fontWeight:profile.airport===a.code?700:400}}>
              {a.city}
            </div>
          ))}
        </div>
        <div style={{fontSize:12,color:TH.mute,marginBottom:8,fontWeight:600,textTransform:"uppercase"}}>Reisedauer</div>
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          {[["2 Tage","WE"],["3 Tage","Langes WE"],["5 Tage","Kurzurlaub"],["7 Tage","1 Woche"],["14 Tage","2 Wochen"]].map(([val,label])=>(
            <div key={val} onClick={()=>upd("duration",val)} style={{background:profile.duration===val?TH.accentLight:TH.surfaceAlt,border:`1px solid ${profile.duration===val?TH.accent:TH.border}`,borderRadius:10,padding:"10px 12px",cursor:"pointer",textAlign:"center"}}>
              <div style={{fontSize:11,fontWeight:700,color:profile.duration===val?TH.accent:TH.text}}>{label}</div>
              <div style={{fontSize:10,color:TH.mute}}>{val}</div>
            </div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[["Hinflug","dateFrom"],["Rückflug","dateTo"]].map(([label,key])=>(
            <div key={key}>
              <div style={{fontSize:11,color:TH.mute,marginBottom:4,fontWeight:600}}>{label}</div>
              <input type="date" value={profile[key]} onChange={e=>upd(key,e.target.value)} style={{width:"100%",background:TH.surfaceAlt,border:`1px solid ${TH.border}`,borderRadius:10,padding:"11px 12px",color:TH.text,outline:"none"}}/>
            </div>
          ))}
        </div>
      </div>
    );

    if(currentStep.type==="style") return(
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {STYLES.map(s=>(
          <div key={s.id} onClick={()=>upd("style",s.id)} style={{display:"flex",alignItems:"center",gap:14,background:profile.style===s.id?TH.accentLight:TH.surfaceAlt,border:`2px solid ${profile.style===s.id?TH.accent:TH.border}`,borderRadius:14,padding:"14px 16px",cursor:"pointer"}}>
            <span style={{fontSize:28}}>{s.emoji}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:700,color:profile.style===s.id?TH.accent:TH.text}}>{s.label}</div>
              <div style={{fontSize:12,color:TH.mute,marginTop:2}}>{s.desc}</div>
            </div>
            {profile.style===s.id&&<Icon name="check" size={18} color={TH.accent}/>}
          </div>
        ))}
      </div>
    );

    if(currentStep.type==="activities") return(
      <div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {ACTIVITIES.map(a=>(
            <div key={a.label} onClick={()=>toggleArr("activity",a.label)} style={{display:"flex",alignItems:"center",gap:10,background:profile.activity.includes(a.label)?TH.accentLight:TH.surfaceAlt,border:`1px solid ${profile.activity.includes(a.label)?TH.accent:TH.border}`,borderRadius:12,padding:"12px 14px",cursor:"pointer"}}>
              <span style={{fontSize:20}}>{a.icon}</span>
              <span style={{fontSize:12,fontWeight:600,color:profile.activity.includes(a.label)?TH.accent:TH.text}}>{a.label}</span>
            </div>
          ))}
        </div>
        {profile.activity.includes("Wandern & Natur")&&(
          <div style={{marginTop:12,background:TH.accentLight,borderRadius:12,padding:"12px 14px",border:`1px solid ${TH.accentBorder}`,fontSize:13,color:TH.accent}}>
            🥾 Super! Wir zeigen dir auch konkrete Wanderrouten mit Hotels auf dem Weg.
          </div>
        )}
      </div>
    );

    if(currentStep.type==="budget") return(
      <div>
        <div style={{fontSize:12,color:TH.mute,marginBottom:8,fontWeight:600,textTransform:"uppercase"}}>Budget pro Person (Flug + Hotel)</div>
        <div style={{fontSize:40,fontWeight:800,color:TH.accent,marginBottom:8}}>{profile.budget} €</div>
        <input type="range" min="100" max="5000" step="50" value={profile.budget} onChange={e=>upd("budget",parseInt(e.target.value))} style={{width:"100%",accentColor:TH.accent,marginBottom:8}}/>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:TH.mute,marginBottom:16}}><span>100 €</span><span>5.000 €</span></div>
        <div style={{display:"flex",gap:6,marginBottom:20}}>
          {[200,400,700,1200,2500].map(b=>(
            <div key={b} onClick={()=>upd("budget",b)} style={{flex:1,background:profile.budget===b?TH.accentLight:TH.surfaceAlt,border:`1px solid ${profile.budget===b?TH.accent:TH.border}`,borderRadius:10,padding:"8px 4px",cursor:"pointer",textAlign:"center",fontSize:11,color:profile.budget===b?TH.accent:TH.sub}}>{b}€</div>
          ))}
        </div>
        <div style={{fontSize:12,color:TH.mute,marginBottom:10,fontWeight:600,textTransform:"uppercase"}}>Unterkunft</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {HOTEL_CATS.map(c=>(
            <div key={c.id} onClick={()=>upd("hotel",c.id)} style={{display:"flex",alignItems:"center",gap:12,background:profile.hotel===c.id?TH.accentLight:TH.surfaceAlt,border:`1.5px solid ${profile.hotel===c.id?TH.accent:TH.border}`,borderRadius:12,padding:"12px 14px",cursor:"pointer"}}>
              <span style={{fontSize:22}}>{c.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:profile.hotel===c.id?TH.accent:TH.text}}>{c.label}</div>
                <div style={{fontSize:11,color:TH.mute}}>{c.desc}</div>
              </div>
              {profile.hotel===c.id&&<Icon name="check" size={16} color={TH.accent}/>}
            </div>
          ))}
        </div>
      </div>
    );

    if(currentStep.type==="fine") return(
      <div>
        <div style={{fontSize:12,color:TH.mute,marginBottom:8,fontWeight:600,textTransform:"uppercase"}}>Bevorzugte Region</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>
          {["🌍 Überall","🇪🇺 Europa","🌊 Mittelmeer","🏝 Karibik","🌏 Asien","🗽 USA & Kanada","🌴 Naher Osten","🌅 Überrasch mich!"].map(r=>(
            <div key={r} onClick={()=>upd("region",profile.region===r?"":r)} style={{background:profile.region===r?TH.accentLight:TH.surfaceAlt,border:`1px solid ${profile.region===r?TH.accent:TH.border}`,borderRadius:20,padding:"7px 14px",cursor:"pointer",fontSize:13,color:profile.region===r?TH.accent:TH.sub,fontWeight:profile.region===r?700:400}}>{r}</div>
          ))}
        </div>
        <div style={{fontSize:12,color:TH.mute,marginBottom:8,fontWeight:600,textTransform:"uppercase"}}>Gewünschtes Klima</div>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          {[["☀️","Heiß","28°+"],["🌤","Warm","22-28°"],["🌥","Mild","15-22°"],["❄️","Kühl","<15°"],["✈️","Egal","Hauptsache weg"]].map(([e,l,d])=>(
            <div key={l} onClick={()=>upd("climate",profile.climate===l?"":l)} style={{flex:1,background:profile.climate===l?TH.accentLight:TH.surfaceAlt,border:`1px solid ${profile.climate===l?TH.accent:TH.border}`,borderRadius:12,padding:"10px 4px",cursor:"pointer",textAlign:"center"}}>
              <div style={{fontSize:18}}>{e}</div>
              <div style={{fontSize:10,fontWeight:700,color:profile.climate===l?TH.accent:TH.text,marginTop:3}}>{l}</div>
              <div style={{fontSize:9,color:TH.mute}}>{d}</div>
            </div>
          ))}
        </div>
        <div style={{fontSize:12,color:TH.mute,marginBottom:8,fontWeight:600,textTransform:"uppercase"}}>Orte ausschließen?</div>
        <input value={profile.excl||""} onChange={e=>upd("excl",e.target.value)} placeholder="z.B. Mallorca, Paris..." style={{width:"100%",background:TH.surfaceAlt,border:`1px solid ${TH.border}`,borderRadius:10,padding:"12px 14px",color:TH.text,outline:"none"}}/>
      </div>
    );

    // Summary
    const prefs=loadPrefs();
    const likedList=Object.entries(prefs.likedTags||{}).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([t])=>t);
    return(
      <div>
        <div style={{background:TH.accentLight,borderRadius:14,padding:16,border:`1px solid ${TH.accentBorder}`,marginBottom:12}}>
          <div style={{fontSize:13,color:TH.accent,fontWeight:600,marginBottom:8}}>✨ KI hat dein Profil gelernt</div>
          {likedList.length>0&&<div style={{fontSize:12,color:TH.sub}}>Du magst: {likedList.join(", ")}</div>}
        </div>
        <div style={{background:TH.surfaceAlt,borderRadius:14,padding:16,border:`1px solid ${TH.border}`}}>
          {[
            ["Reiseart",profile.traveler],["Von",profile.airport],
            ["Zeitraum",`${profile.dateFrom} → ${profile.dateTo}`],
            ["Budget",`${profile.budget} €`],["Stil",profile.style||"-"],
            ["Aktivitäten",profile.activity.slice(0,2).join(", ")||"-"],
            ["Region",profile.region||"Weltweit"],["Klima",profile.climate||"-"],
          ].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:`1px solid ${TH.border}`}}>
              <span style={{fontSize:13,color:TH.mute}}>{k}</span>
              <span style={{fontSize:13,color:TH.text,fontWeight:600,textAlign:"right",maxWidth:"58%"}}>{v}</span>
            </div>
          ))}
        </div>
      </div>
    );
  };

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:TH.bg}}>
      <div style={{height:4,background:TH.border,flexShrink:0}}>
        <div style={{height:4,background:TH.grad,width:`${prog}%`,transition:"width .3s",borderRadius:2}}/>
      </div>
      <div style={{padding:"14px 16px 0",flexShrink:0,display:"flex",alignItems:"center",gap:10}}>
        <button onClick={()=>step===0?onBack():setStep(s=>s-1)} style={{width:38,height:38,background:TH.surfaceAlt,border:`1px solid ${TH.border}`,borderRadius:10,color:TH.sub,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <Icon name="arrowLeft" size={16} color={TH.sub}/>
        </button>
        <div>
          <div style={{fontSize:11,color:TH.mute,textTransform:"uppercase"}}>Schritt {step+1} / {QUIZ_STEPS.length}</div>
          <h2 style={{fontSize:19,fontWeight:800,color:TH.text}}>{QUIZ_STEPS[step].title}</h2>
          <p style={{fontSize:12,color:TH.mute}}>{QUIZ_STEPS[step].sub}</p>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"14px 16px",WebkitOverflowScrolling:"touch"}}>
        {renderStep()}
        <div style={{height:16}}/>
      </div>
      <div style={{padding:16,borderTop:`1px solid ${TH.border}`,flexShrink:0,background:TH.bg}}>
        <button onClick={()=>isLast?onComplete(profile):setStep(s=>s+1)} style={{width:"100%",height:52,background:TH.grad,border:"none",borderRadius:14,color:TH.bg,fontSize:15,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          {isLast?"🚀 Traumreise finden!":"Weiter"}
          {!isLast&&<Icon name="arrowRight" size={16} color={TH.bg}/>}
        </button>
      </div>
    </div>
  );
}

// ── HOME ──────────────────────────────────────────────────────────────────────
function Home({setActive,setShowSwipe,showSwipe,savedTrips}){
  const [likedDests,setLikedDests]=useState([]);
  const [dislikedDests,setDislikedDests]=useState([]);
  const prefs=loadPrefs();
  const hasPrefs=prefs.liked&&prefs.liked.length>0;

  const cats=[
    {label:"Spontan",emoji:"✈️",sub:"Wochenend-Deals"},
    {label:"Strand",emoji:"🏖",sub:"Sonne & Meer"},
    {label:"Städtetrip",emoji:"🏙",sub:"Kultur & Lifestyle"},
    {label:"Wandern",emoji:"🥾",sub:"Routen & Natur"},
    {label:"Romantik",emoji:"💑",sub:"Pärchen-Trips"},
    {label:"Abenteuer",emoji:"🧗",sub:"Raus aus der Komfortzone"},

    <div style={{display:"flex",flexDirection:"column"}}>
      <div style={{padding:"16px 16px 0"}}>
        <div style={{fontSize:18,fontWeight:800,color:TH.text,marginBottom:4}}>Welche Ziele magst du?</div>
        <div style={{fontSize:13,color:TH.mute,marginBottom:12}}>Swipen oder tippen – die KI lernt deine Vorlieben</div>
      </div>
      <SwipeCards
        onLike={d=>setLikedDests(l=>[...l,d])}
        onDislike={d=>setDislikedDests(l=>[...l,d])}
        onDone={()=>setShowSwipe(false)}
      />

  return(
    <div style={{display:"flex",flexDirection:"column"}}>
      <div style={{position:"relative",height:240,overflow:"hidden",borderRadius:"0 0 28px 28px",marginBottom:20}}>
        <img src={DEST_IMAGES.default} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="Reisen"/>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,rgba(8,8,8,0.1),rgba(8,8,8,0.88))"}}/>

          <div style={{fontSize:12,color:"rgba(255,255,255,0.6)",marginBottom:4,fontWeight:600,textTransform:"uppercase"}}>Deine nächste Reise</div>

          <button onClick={()=>setActive("onboarding")} style={{background:TH.grad,border:"none",borderRadius:14,padding:"13px 22px",fontSize:15,fontWeight:800,color:TH.bg,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:8}}>
            <Icon name="search" size={16} color={TH.bg}/> Traumreise finden
          </button>
        </div>
      </div>

      <div style={{padding:"0 16px",display:"flex",flexDirection:"column",gap:24}}>
        {!hasPrefs&&(
          <div style={{background:TH.accentLight,borderRadius:16,padding:16,border:`1px solid ${TH.accentBorder}`}}>
            <div style={{fontSize:14,fontWeight:700,color:TH.accent,marginBottom:4}}>✨ KI lernt deine Vorlieben</div>
            <div style={{fontSize:12,color:TH.sub,marginBottom:12}}>Swipen und die KI findet perfekte Reisen für dich</div>
            <button onClick={()=>setShowSwipe(true)} style={{background:TH.accent,border:"none",borderRadius:10,padding:"10px 16px",fontSize:13,fontWeight:700,color:TH.bg,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
              <Icon name="heartFill" size={14} color={TH.bg}/> Ziele durchswipen
            </button>
          </div>
        )}

        {hasPrefs&&(
          <div style={{background:TH.surfaceAlt,borderRadius:16,padding:14,border:`1px solid ${TH.border}`}}>
            <div style={{fontSize:13,fontWeight:700,color:TH.text,marginBottom:2}}>🧠 KI kennt deine Vorlieben</div>
            <div style={{fontSize:12,color:TH.mute,marginBottom:10}}>
              Du magst: {Object.entries(prefs.likedTags||{}).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([t])=>t).join(", ")}
            </div>
            <button onClick={()=>setShowSwipe(true)} style={{background:"transparent",border:`1px solid ${TH.border}`,borderRadius:8,padding:"6px 12px",fontSize:12,color:TH.sub,cursor:"pointer"}}>
              Mehr swipen →
            </button>
          </div>

        <div>
          <div style={{fontSize:16,fontWeight:800,color:TH.text,marginBottom:12}}>Reiseart</div>

                <div style={{fontSize:24,marginBottom:6}}>{c.emoji}</div>
                <div style={{fontSize:12,fontWeight:700,color:TH.text}}>{c.label}</div>
                <div style={{fontSize:10,color:TH.mute,marginTop:2}}>{c.sub}</div>
              </div>

                  <div style={{fontSize:13,fontWeight:700,color:TH.text}}>{d.dest}</div>
                  <div style={{fontSize:11,color:TH.mute}}>{d.region}</div>
                  <div style={{fontSize:11,color:TH.accent,marginTop:5,fontWeight:600}}>Routen anzeigen →</div>
                </div>
              </div>

          </div>

        {savedTrips.length>0&&(

              {savedTrips.slice(0,3).map(t=>(
                <div key={t.id||t.dest} style={{flexShrink:0,width:140,background:TH.surface,borderRadius:12,overflow:"hidden",border:`1px solid ${TH.border}`}}>
                  <div style={{height:80}}>
                    <img src={DEST_IMAGES[t.iata]||DEST_IMAGES.default} style={{width:"100%",height:"100%",objectFit:"cover"}} alt={t.dest}/>

// ── RESULTS ───────────────────────────────────────────────────────────────────
function Results({profile,savedTrips,onSave,onDetail,onHome}){
  const [trips,setTrips]=useState([]);
  const [loading,setLoading]=useState(true);
  const [loadMsg,setLoadMsg]=useState("KI analysiert dein Profil...");
  const [error,setError]=useState(null);

  useEffect(()=>{
    let cancelled=false;
    const msgs=["KI analysiert dein Profil...","Traumziele werden gesucht...","Routen & Hotels werden gefunden...","Preise werden berechnet...","Beste Deals werden sortiert..."];
    let mi=0;
    const iv=setInterval(()=>{if(!cancelled){mi=(mi+1)%msgs.length;setLoadMsg(msgs[mi]);}},1200);

    const prefs=loadPrefs();
    const enhancedProfile={...profile,likedDestinations:prefs.liked||[],likedTags:prefs.likedTags||{},dislikedDestinations:prefs.disliked||[]};

    searchTripsWithAI(enhancedProfile)
      .then(trips=>{if(!cancelled){setTrips(trips||[]);setLoading(false);}})
      .catch(e=>{if(!cancelled){setError("Suche fehlgeschlagen. Bitte nochmal versuchen.");setLoading(false);}})
      .finally(()=>clearInterval(iv));

    return()=>{cancelled=true;clearInterval(iv);};
  },[]);

  if(loading) return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"60vh",gap:20}}>
      <div style={{width:48,height:48,border:`3px solid ${TH.border}`,borderTopColor:TH.accent,borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:15,fontWeight:700,color:TH.text,marginBottom:6}}>{loadMsg}</div>
        <div style={{fontSize:13,color:TH.mute}}>KI findet deine Traumreise</div>
      </div>
    </div>
  );

  if(error||trips.length===0) return(
    <div style={{textAlign:"center",padding:"40px 20px"}}>
      <div style={{fontSize:48,marginBottom:16}}>😔</div>
      <div style={{fontSize:16,fontWeight:700,color:TH.text,marginBottom:8}}>{error||"Keine Trips gefunden"}</div>
      <div style={{fontSize:13,color:TH.mute,marginBottom:20}}>Probiere andere Einstellungen</div>
      <button onClick={onHome} style={{background:TH.accent,border:"none",borderRadius:12,padding:"12px 24px",fontSize:14,fontWeight:700,color:TH.bg,cursor:"pointer"}}>
        Neu suchen
      </button>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <h2 style={{fontSize:20,fontWeight:800,color:TH.text}}>Deine Traumreisen</h2>
          <p style={{fontSize:13,color:TH.mute,marginTop:2}}>{profile.airport} · {profile.duration} · {profile.budget} €</p>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:5,background:TH.accentLight,borderRadius:20,padding:"4px 10px",border:`1px solid ${TH.accentBorder}`}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:TH.accent}}/>
            <span style={{fontSize:11,color:TH.accent,fontWeight:700}}>KI</span>
          </div>
          <button onClick={onHome} style={{background:TH.surfaceAlt,border:`1px solid ${TH.border}`,borderRadius:8,padding:"6px 10px",fontSize:11,color:TH.sub,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
            <Icon name="home" size={12} color={TH.sub}/> Home
          </button>
        </div>
      </div>
      {trips.map((trip,i)=>(
        <TripCard key={trip.id||i} trip={trip} isBest={i===0} profile={profile}
          isSaved={savedTrips.some(s=>s.dest===trip.dest)}

      ))}
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function TripFind(){
  const [active,setActive]=useState("home");
  const [showSwipe,setShowSwipe]=useState(false);
  const [profile,setProfile]=useState({
    traveler:"Solo",airport:"MUC",duration:"4 Tage",
    dateFrom:todayPlus(7),dateTo:todayPlus(11),
    budget:500,hotel:"hotel3",vibes:[],activity:[],
    style:"",climate:"",region:"",excl:"",
  });
  const [savedTrips,setSavedTrips]=useState(()=>{try{return JSON.parse(localStorage.getItem("tf_saved")||"[]")}catch{return[]}});
  const [detailTrip,setDetailTrip]=useState(null);
  const [toast,setToast]=useState(null);

  function showToast(msg,type="success"){setToast({msg,type});}

  function onSave(trip){
    setSavedTrips(prev=>{
      const exists=prev.some(s=>s.dest===trip.dest);
      const next=exists?prev.filter(s=>s.dest!==trip.dest):[...prev,trip];
      try{localStorage.setItem("tf_saved",JSON.stringify(next));}catch{}
      showToast(exists?"Entfernt":"Gespeichert! ❤️",exists?"info":"success");
      return next;
    });
  }

  function onDetail(trip){setDetailTrip(trip);setActive("detail");}

  const showNav=!["onboarding","detail"].includes(active);

  const pages={
    home:<Home setActive={setActive} setShowSwipe={setShowSwipe} showSwipe={showSwipe} savedTrips={savedTrips}/>,
    onboarding:<Onboarding onComplete={p=>{setProfile(p);setActive("results");}} onBack={()=>setActive("home")}/>,
    results:<Results profile={profile} savedTrips={savedTrips} onSave={onSave} onDetail={onDetail} onHome={()=>setActive("home")}/>,
    detail:detailTrip?<DetailView trip={detailTrip} profile={profile} onBack={()=>setActive("results")} onBook={()=>window.open(buildSkyscannerUrl(profile.airport,detailTrip.iata,profile.dateFrom,profile.dateTo),"_blank")}/>:null,
    saved:<Saved savedTrips={savedTrips} onRemove={dest=>onSave({dest})} onDetail={onDetail}/>,
  };

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100dvh",background:TH.bg,fontFamily:"'DM Sans',system-ui,sans-serif",overflow:"hidden",maxWidth:430,margin:"0 auto"}}>
      {active!=="onboarding"&&active!=="detail"&&(
        <header style={{height:54,background:TH.surface,borderBottom:`1px solid ${TH.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 18px",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:17,fontWeight:800,color:TH.text}}>TripFind</span>
            <div style={{width:7,height:7,borderRadius:"50%",background:TH.accent}}/>
          </div>
          {active!=="home"&&(
            <button onClick={()=>setActive("onboarding")} style={{background:TH.accentLight,border:`1px solid ${TH.accentBorder}`,borderRadius:8,padding:"7px 12px",fontSize:12,color:TH.accent,cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontWeight:700}}>
              <Icon name="search" size={12} color={TH.accent}/> Neue Suche
            </button>
          )}
        </header>
      )}
      <main style={{flex:1,overflowY:"auto",padding:active==="onboarding"||active==="home"||active==="detail"?"0":"16px",background:TH.bg,color:TH.text,WebkitOverflowScrolling:"touch"}}>
        {pages[active]||<div style={{padding:40,textAlign:"center",color:TH.mute}}>Seite nicht gefunden</div>}
      </main>
      {showNav&&<BottomNav active={active} setActive={act=>{if(act==="results"&&!profile.airport)setActive("onboarding");else setActive(act);}}/>}
      {toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<TripFind/>);
</script>
</body>
</html>
