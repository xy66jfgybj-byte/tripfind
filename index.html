// ── HELPERS ───────────────────────────────────────────────────────────────────
function todayPlus(d){const dt=new Date();dt.setDate(dt.getDate()+d);return dt.toISOString().split("T")[0];}
function formatPrice(n){return new Intl.NumberFormat("de-DE",{maximumFractionDigits:0}).format(n)+" €";}
function buildSkyscannerUrl(o,d,dep,ret){
  const d1=dep.replace(/-/g,"").slice(2),d2=ret.replace(/-/g,"").slice(2);
  return `https://www.skyscanner.de/transport/fluge/${o.toLowerCase()}/${d.toLowerCase()}/${d1}/${d2}/`;
}
function buildBookingUrl(dest,ci,co){
  return `https://www.booking.com/searchresults.de.html?ss=${encodeURIComponent(dest)}&checkin=${ci}&checkout=${co}`;
}
function buildGetYourGuideUrl(dest){
  return `https://www.getyourguide.de/${dest.toLowerCase().replace(/ /g,"-")}-l/`;
}

// Driving distance estimate (rough km based on lat/lon)
function estimateDriveHours(airportCode, destLat, destLon) {
  const ap = AIRPORTS.find(a => a.code === airportCode);
  if (!ap) return null;
  const dlat = ap.lat - destLat, dlon = ap.lon - destLon;
  const km = Math.sqrt(dlat*dlat + dlon*dlon) * 111;
  return Math.round(km / 90 * 10) / 10; // ~90km/h avg
}

// ── WEATHER ───────────────────────────────────────────────────────────────────
async function fetchWeather(iata, dateStr) {
  const c = DEST_COORDS[iata];
  if (!c) return null;
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto&start_date=${dateStr}&end_date=${dateStr}`;
    const res = await fetch(url);
    const data = await res.json();
    const max = Math.round(data.daily?.temperature_2m_max?.[0]||0);
    const min = Math.round(data.daily?.temperature_2m_min?.[0]||0);
    const code = data.daily?.weathercode?.[0]||0;
    const emoji = code===0?"☀️":code<=3?"🌤":code<=48?"🌥":code<=67?"🌧":"❄️";
    return {max,min,emoji};
  } catch { return null; }
}

// ── AI SEARCH ─────────────────────────────────────────────────────────────────
async function searchTripsWithAI(profile) {
  const res = await fetch("/api/search", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(profile)
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data.trips;
}

// ── VOTING (Supabase) ─────────────────────────────────────────────────────────
async function voteForTrip(dest, iata) {
  if (SUPABASE_URL === "YOUR_SUPABASE_URL") return; // not configured yet
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/votes`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Prefer": "resolution=merge-duplicates"
      },
      body: JSON.stringify({dest, iata, votes: 1, week: getWeekKey()})
    });
  } catch {}
}

async function fetchTopVotes() {
  if (SUPABASE_URL === "YOUR_SUPABASE_URL") {
    return [
      {dest:"Barcelona",iata:"BCN",votes:847,country:"Spanien"},
      {dest:"Lissabon",iata:"LIS",votes:623,country:"Portugal"},
      {dest:"Mallorca",iata:"PMI",votes:589,country:"Spanien"},
      {dest:"Amsterdam",iata:"AMS",votes:412,country:"Niederlande"},
      {dest:"Athen",iata:"ATH",votes:398,country:"Griechenland"},
    ];
  }
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/votes?week=eq.${getWeekKey()}&order=votes.desc&limit=5`, {
      headers: {"apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`}
    });
    return await res.json();
  } catch { return []; }
}

function getWeekKey() {
  const d = new Date();
  const week = Math.ceil(d.getDate() / 7);
  return `${d.getFullYear()}-${d.getMonth()+1}-W${week}`;
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function Toast({msg,type,onDone}) {
  useEffect(()=>{const t=setTimeout(onDone,3000);return()=>clearTimeout(t);},[]);
  const c={success:TH.accent,error:TH.red,info:TH.blue,warning:TH.amber}[type]||TH.accent;
  const bg={success:TH.accentLight,error:TH.redLight,info:TH.blueLight,warning:TH.amberLight}[type]||TH.accentLight;
  return(
    <div style={{position:"fixed",bottom:80,left:16,right:16,background:bg,border:`1px solid ${c}44`,borderRadius:14,padding:"14px 18px",color:c,fontSize:14,fontWeight:600,zIndex:400,boxShadow:TH.shadowLg,textAlign:"center"}}>
      {msg}
    </div>
  );
}

// ── PRICE ESTIMATE BADGE ──────────────────────────────────────────────────────
function PriceEstimate({category, budget, nights=4}) {
  const est = PRICE_ESTIMATES[category];
  if (!est) return null;
  const flightMid = Math.round((est.flight[0]+est.flight[1])/2);
  const hotelMid = Math.round((est.hotel_night[0]+est.hotel_night[1])/2);
  const totalEst = flightMid + hotelMid * nights;
  const fits = budget >= totalEst * 0.8;

  return(
    <div style={{background:fits?TH.accentLight:TH.amberLight,border:`1px solid ${fits?TH.accentBorder:TH.amberBorder}`,borderRadius:12,padding:"10px 14px",marginTop:10}}>
      <div style={{fontSize:12,fontWeight:700,color:fits?TH.accent:TH.amber,marginBottom:4}}>
        {fits?"✅ Passt in dein Budget":"💡 Ungefähre Preise"}
      </div>
      <div style={{display:"flex",gap:12,fontSize:12,color:fits?TH.accent:TH.amber}}>
        <span>✈️ Flug: {formatPrice(est.flight[0])}–{formatPrice(est.flight[1])}</span>
        <span>🏨 Hotel/N: {formatPrice(est.hotel_night[0])}–{formatPrice(est.hotel_night[1])}</span>
      </div>
      <div style={{fontSize:11,color:TH.sub,marginTop:3}}>
        Geschätzt für {nights} Tage: {formatPrice(flightMid + hotelMid*nights)}
      </div>
    </div>
  );
}

// ── ADAPTIVE ONBOARDING ───────────────────────────────────────────────────────
function Onboarding({onComplete, onBack}) {
  const [step, setStep] = useState(0);
  const [profile, setProfile] = useState({
    traveler:"Solo", transport:"flight", airport:"MUC", driveHours:2,
    duration:"4 Tage", dateFrom:todayPlus(7), dateTo:todayPlus(11),
    budget:500, hotel:"hotel3",
    mainType:"", // beach/mountain/city/hiking/party/wellness/culture
    // Adaptive sub-questions based on mainType:
    beachType:"", // europe/caribbean/tropical
    mountainType:"", // alps/dolomites/scotland/norway
    cityType:"", // culture/nightlife/food/shopping
    hikingLevel:"", // easy/medium/hard
    hikingTerrain:"", // alps/coastal/forest/canyon
    partyType:"", // club/festival/beach-party
    wellnessType:"", // spa/yoga/detox
    cultureType:"", // history/art/local-life
    climate:"", region:"", excl:"", flightPref:"",
    style:"", extraWishes:"",
  });

  function upd(k,v) { setProfile(p=>({...p,[k]:v})); }

  // Dynamic steps based on mainType selection
  const getSteps = () => {
    const base = [
      {id:"transport", title:"Wie reist du an?", sub:"Flug oder mit dem Auto?"},
      {id:"traveler", title:"Wer reist mit?", sub:"Das beeinflusst alle Vorschläge"},
      {id:"mainType", title:"Was für eine Reise?", sub:"Wähle deinen Traumurlaubs-Typ"},
    ];

    // Adaptive sub-questions
    if (profile.mainType === "beach") base.push({id:"beachSub", title:"Welcher Strand?", sub:"Europa, Karibik oder tropisch?"});
    if (profile.mainType === "mountain") base.push({id:"mountainSub", title:"Welche Berge?", sub:"Alpen, Dolomiten oder Fjorde?"});
    if (profile.mainType === "city") base.push({id:"citySub", title:"Was suchst du in der Stadt?", sub:"Kultur, Nightlife oder Kulinarik?"});
    if (profile.mainType === "hiking") {
      base.push({id:"hikingLevel", title:"Dein Wanderniveau?", sub:"Wie fit bist du auf dem Trail?"});
      base.push({id:"hikingTerrain", title:"Welches Gelände?", sub:"Alpen, Küste, Wald oder Canyon?"});
    }
    if (profile.mainType === "party") base.push({id:"partySub", title:"Was für Partys?", sub:"Club, Festival oder Strandparty?"});
    if (profile.mainType === "wellness") base.push({id:"wellnessSub", title:"Welche Auszeit?", sub:"Spa, Yoga oder Detox?"});

    base.push(
      {id:"logistics", title:"Wann und wie lange?", sub:"Zeitraum und Dauer"},
      {id:"budget", title:"Budget & Unterkunft", sub:"Ungefähre Preise werden angezeigt"},
      {id:"fine", title:"Letzte Details", sub:"Für noch bessere Treffer"},
      {id:"summary", title:"Dein Profil ist fertig!", sub:"Alles auf einen Blick"},
    );
    return base;
  };

  const steps = getSteps();
  const isLast = step === steps.length - 1;
  const prog = Math.round(((step+1)/steps.length)*100);
  const currentStep = steps[step];
  const nights = parseInt(profile.duration)||4;

  // Price category based on selections
  const getPriceCategory = () => {
    if (profile.mainType==="beach" && profile.beachType==="caribbean") return "beach_caribbean";
    if (profile.mainType==="beach") return "beach_europe";
    if (profile.mainType==="mountain"||profile.mainType==="hiking") return profile.mainType==="hiking"?"hiking":"mountain_alps";
    if (profile.mainType==="city") return "city_europe";
    if (profile.mainType==="party") return "party";
    return "city_europe";
  };

  const renderStep = () => {
    const s = currentStep.id;

    if (s === "transport") return(
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {[
          {id:"flight",emoji:"✈️",label:"Mit dem Flugzeug",desc:"Weltweit in kürzester Zeit"},
          {id:"car",emoji:"🚗",label:"Mit dem Auto",desc:"Flexibel & entspannt"},
          {id:"both",emoji:"🔀",label:"Beides möglich",desc:"Zeig mir alle Optionen"},

    );

    // Summary
    const mainLabels={beach:"🏖 Strand",mountain:"🏔 Berge",city:"🏙 Städtetrip",hiking:"🥾 Wandern",party:"🎉 Party",wellness:"🧘 Wellness",culture:"🎭 Kultur",adventure:"🧗 Abenteuer"};

      <div>
        <div style={{background:TH.accentLight,borderRadius:14,padding:14,border:`1px solid ${TH.accentBorder}`,marginBottom:12}}>
          <div style={{fontSize:14,fontWeight:700,color:TH.accent,marginBottom:4}}>🚀 KI sucht jetzt deinen Traumurlaub</div>
          <div style={{fontSize:12,color:TH.sub}}>Basierend auf {Object.values(profile).filter(v=>v&&v!=="").length} Präferenzen</div>
        </div>
        <div style={{background:TH.surfaceAlt,borderRadius:14,padding:14,border:`1px solid ${TH.border}`}}>
          {[
            ["Anreise",profile.transport==="car"?`🚗 Auto bis ${profile.driveHours}h`:`✈️ ${profile.airport}`],
            ["Reiseart",profile.traveler],
            ["Urlaubstyp",mainLabels[profile.mainType]||"-"],
            ["Zeitraum",`${profile.dateFrom} → ${profile.dateTo}`],
            ["Dauer",profile.duration],
            ["Budget",formatPrice(profile.budget)],
            ["Unterkunft",HOTEL_CATS.find(c=>c.id===profile.hotel)?.label||"-"],
            ["Klima",profile.climate||"Egal"],
            ["Besondere Wünsche",profile.extraWishes?profile.extraWishes.slice(0,30)+"...":"-"],

            <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:`1px solid ${TH.border}`}}>

    );
  };

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:TH.bg}}>
      <div style={{height:4,background:TH.border,flexShrink:0}}>
        <div style={{height:4,background:TH.grad,width:`${prog}%`,transition:"width .3s",borderRadius:2}}/>
      </div>
      <div style={{padding:"14px 16px 0",flexShrink:0,display:"flex",alignItems:"center",gap:10}}>
        <button onClick={()=>step===0?onBack():setStep(s=>s-1)} style={{width:38,height:38,background:TH.surfaceAlt,border:`1px solid ${TH.border}`,borderRadius:10,color:TH.sub,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <Icon name="arrowLeft" size={16} color={TH.sub}/>
        </button>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:TH.mute,textTransform:"uppercase"}}>Schritt {step+1} / {steps.length}</div>
          <h2 style={{fontSize:18,fontWeight:800,color:TH.text,lineHeight:1.2}}>{currentStep.title}</h2>
          <p style={{fontSize:12,color:TH.mute}}>{currentStep.sub}</p>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"12px 16px",WebkitOverflowScrolling:"touch"}}>
        {renderStep()}
        <div style={{height:16}}/>
      </div>
      <div style={{padding:16,borderTop:`1px solid ${TH.border}`,flexShrink:0,background:TH.bg}}>
        <button onClick={()=>{
          if(isLast){onComplete(profile);}
          else{
            // Skip to next relevant step
            const nextStep=step+1;
            setStep(nextStep);
          }
        }} style={{width:"100%",height:52,background:TH.grad,border:"none",borderRadius:14,color:TH.bg,fontSize:15,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          {isLast?"🚀 Traumreise finden!":"Weiter"}
          {!isLast&&<Icon name="arrowRight" size={16} color={TH.bg}/>}
        </button>
      </div>
    </div>
  );
}

// ── RESULTS ───────────────────────────────────────────────────────────────────
function Results({profile, savedTrips, onSave, onDetail, onHome}) {
  const [trips, setTrips] = useState([]);
  const [loading, setLoading] = useState(true);
  const [loadMsg, setLoadMsg] = useState("KI analysiert dein Profil...");
  const [error, setError] = useState(null);

  useEffect(()=>{
    let cancelled=false;
    const msgs=["KI analysiert dein Profil...","Passende Ziele werden gesucht...","Preise werden berechnet...","Beste Deals werden sortiert..."];
    let mi=0;
    const iv=setInterval(()=>{if(!cancelled){mi=(mi+1)%msgs.length;setLoadMsg(msgs[mi]);}},1200);
    searchTripsWithAI(profile)
      .then(trips=>{if(!cancelled){setTrips(trips||[]);setLoading(false);}})
      .catch(e=>{if(!cancelled){setError("Suche fehlgeschlagen.");setLoading(false);}})
      .finally(()=>clearInterval(iv));
    return()=>{cancelled=true;clearInterval(iv);};
  },[]);

  if(loading) return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"60vh",gap:20}}>
      <div style={{width:48,height:48,border:`3px solid ${TH.border}`,borderTopColor:TH.accent,borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:15,fontWeight:700,color:TH.text,marginBottom:6}}>{loadMsg}</div>
        <div style={{fontSize:13,color:TH.mute}}>Einen Moment...</div>
      </div>
    </div>
  );

  if(error||trips.length===0) return(
    <div style={{textAlign:"center",padding:"40px 20px"}}>
      <div style={{fontSize:48,marginBottom:16}}>😔</div>
      <div style={{fontSize:16,fontWeight:700,color:TH.text,marginBottom:8}}>{error||"Keine Trips gefunden"}</div>
      <button onClick={onHome} style={{background:TH.accent,border:"none",borderRadius:12,padding:"12px 24px",fontSize:14,fontWeight:700,color:TH.bg,cursor:"pointer",marginTop:8}}>
        Neu suchen
      </button>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <h2 style={{fontSize:20,fontWeight:800,color:TH.text}}>Deine Traumreisen</h2>
          <p style={{fontSize:13,color:TH.mute,marginTop:2}}>{profile.transport==="car"?`🚗 Auto ≤${profile.driveHours}h`:`✈️ ${profile.airport}`} · {profile.duration} · {formatPrice(profile.budget)}</p>
        </div>
        <button onClick={onHome} style={{background:TH.surfaceAlt,border:`1px solid ${TH.border}`,borderRadius:8,padding:"7px 12px",fontSize:11,color:TH.sub,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
          <Icon name="home" size={12} color={TH.sub}/> Home
        </button>
      </div>
      {trips.map((trip,i)=>(
        <TripCard key={trip.id||i} trip={trip} isBest={i===0} profile={profile}
          isSaved={savedTrips.some(s=>s.dest===trip.dest)}
          onSave={()=>{onSave(trip);voteForTrip(trip.dest,trip.iata);}}
          onDetail={()=>onDetail(trip)}/>
      ))}
    </div>
  );
}

// ── TRIP CARD ─────────────────────────────────────────────────────────────────
function TripCard({trip, isBest, isSaved, onSave, onDetail, profile}) {
  const [weather, setWeather] = useState(null);
  const [imgErr, setImgErr] = useState(false);
  const img = imgErr?DEST_IMAGES.default:(DEST_IMAGES[trip.iata]||DEST_IMAGES.default);
  const isDriving = profile.transport === "car";

  useEffect(()=>{
    if(trip.iata&&profile?.dateFrom) fetchWeather(trip.iata,profile.dateFrom).then(w=>{if(w)setWeather(w);});
  },[trip.iata,profile?.dateFrom]);

  const driveHours = isDriving ? estimateDriveHours(profile.airport, DEST_COORDS[trip.iata]?.lat, DEST_COORDS[trip.iata]?.lon) : null;

  return(
    <div style={{background:TH.surface,border:`${isBest?"2px":"1px"} solid ${isBest?TH.accent:TH.border}`,borderRadius:20,overflow:"hidden",boxShadow:TH.shadow}} className="fade-up">
      <div style={{position:"relative",height:180}}>
        <img src={img} onError={()=>setImgErr(true)} style={{width:"100%",height:"100%",objectFit:"cover"}} alt={trip.dest}/>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,transparent 30%,rgba(0,0,0,0.85))"}}/>
        {isBest&&<div style={{position:"absolute",top:12,left:12,background:TH.grad,borderRadius:20,padding:"4px 12px",fontSize:11,color:TH.bg,fontWeight:800}}>⭐ Beste Wahl</div>}
        {weather&&(
          <div style={{position:"absolute",top:12,right:44,background:"rgba(0,0,0,0.7)",borderRadius:20,padding:"4px 10px",fontSize:12,color:"#fff",fontWeight:600}}>
            {weather.emoji} {weather.max}°/{weather.min}°

        )}
        <button onClick={onSave} style={{position:"absolute",top:8,right:8,width:36,height:36,background:"rgba(0,0,0,0.6)",border:"none",borderRadius:"50%",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <Icon name={isSaved?"heartFill":"heart"} size={16} color={isSaved?TH.accent:"#fff"}/>

            window.open(url,"_blank");
          }} style={{flex:1,height:44,background:TH.grad,border:"none",borderRadius:12,color:TH.bg,fontSize:13,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            {isDriving?"🚗 Route":"✈️ Buchen"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── DETAIL VIEW ───────────────────────────────────────────────────────────────
function DetailView({trip, profile, onBack}) {
  const [weather, setWeather] = useState(null);
  const img = DEST_IMAGES[trip.iata]||DEST_IMAGES.default;
  const isDriving = profile.transport === "car";
  const nights = parseInt(profile.duration)||4;
  const months = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
  const priceFactors = [1.4,1.3,0.9,0.85,0.8,1.2,1.5,1.5,0.9,0.8,0.75,1.1];
  const base = trip.flightPrice||150;

  useEffect(()=>{
    if(trip.iata&&profile.dateFrom) fetchWeather(trip.iata,profile.dateFrom).then(w=>{if(w)setWeather(w);});
  },[]);

  const hikingRoutes = profile.mainType === "hiking" ? [
    {name:`${trip.dest} Panorama-Weg`,distance:"12 km",elevation:"450 m",difficulty:"Mittel",duration:"4-5 Std",hotels:[`Hotel Trail Inn ${trip.dest}`,`Nature Resort ${trip.dest}`]},
    {name:`${trip.dest} Hauptgipfel`,distance:"8 km",elevation:"750 m",difficulty:"Schwer",duration:"6-7 Std",hotels:[`Berghotel ${trip.dest}`,`Alpine Lodge`]},
    {name:`${trip.dest} Tal-Route`,distance:"5 km",elevation:"120 m",difficulty:"Leicht",duration:"2 Std",hotels:[`Gasthof ${trip.dest}`,`Wanderhotel`]},
  ] : [];

  return(
    <div style={{display:"flex",flexDirection:"column"}}>
      <div style={{position:"relative",height:220}}>
        <img src={img} style={{width:"100%",height:"100%",objectFit:"cover"}} alt={trip.dest}/>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,rgba(0,0,0,0.3),rgba(0,0,0,0.75))"}}/>
        <button onClick={onBack} style={{position:"absolute",top:16,left:16,width:40,height:40,background:"rgba(0,0,0,0.6)",border:"none",borderRadius:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <Icon name="arrowLeft" size={18} color="#fff"/>
        </button>
        <div style={{position:"absolute",bottom:0,left:0,right:0,padding:16}}>
          <div style={{fontSize:26,fontWeight:800,color:"#fff"}}>{trip.dest}</div>
          <div style={{fontSize:14,color:"rgba(255,255,255,0.75)"}}>{trip.country}</div>
        </div>
        {weather&&(
          <div style={{position:"absolute",top:16,right:16,background:"rgba(0,0,0,0.7)",borderRadius:12,padding:"8px 12px",textAlign:"center"}}>
            <div style={{fontSize:22}}>{weather.emoji}</div>
            <div style={{fontSize:14,color:"#fff",fontWeight:700}}>{weather.max}°</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.6)"}}>am {profile.dateFrom}</div>
          </div>
        )}
      </div>

      <div style={{padding:"16px",display:"flex",flexDirection:"column",gap:14}}>
        {trip.whyPerfect&&(
          <div style={{background:TH.accentLight,borderRadius:14,padding:14,border:`1px solid ${TH.accentBorder}`}}>
            <div style={{fontSize:13,fontWeight:700,color:TH.accent,marginBottom:4}}>✨ Warum perfekt für dich</div>
            <div style={{fontSize:13,color:TH.sub,lineHeight:1.5}}>{trip.whyPerfect}</div>
          </div>
        )}

        {!isDriving&&(
          <div style={{background:TH.surface,borderRadius:14,padding:14,border:`1px solid ${TH.border}`}}>
            <div style={{fontSize:14,fontWeight:800,color:TH.text,marginBottom:12}}>📅 Preiskalender – wann ist es günstig?</div>
            <div style={{display:"flex",gap:4,overflowX:"auto"}}>
              {months.map((m,i)=>{
                const price=Math.round(base*priceFactors[i]);
                const isCheap=price<base*0.9;
                const isSelected=i===new Date(profile.dateFrom).getMonth();
                return(
                  <div key={m} style={{flexShrink:0,textAlign:"center",padding:"6px 4px",borderRadius:8,background:isSelected?TH.accentLight:isCheap?"rgba(0,229,160,0.08)":"transparent",border:`1px solid ${isSelected?TH.accent:isCheap?TH.accentBorder:TH.border}`,minWidth:42}}>
                    <div style={{fontSize:10,color:TH.mute}}>{m}</div>
                    <div style={{fontSize:11,fontWeight:700,color:isCheap?TH.accent:isSelected?TH.accent:TH.text,marginTop:2}}>{price}€</div>
                    {isCheap&&<div style={{fontSize:8,color:TH.accent}}>💚</div>}
                  </div>
                );
              })}
            </div>
            <div style={{fontSize:11,color:TH.mute,marginTop:8}}>💚 = Günstigste Monate für dieses Ziel</div>
          </div>
        )}

        {hikingRoutes.length>0&&(
          <div>
            <div style={{fontSize:14,fontWeight:800,color:TH.text,marginBottom:10}}>🥾 Wanderrouten in {trip.dest}</div>
            {hikingRoutes.map((r,i)=>(
              <div key={i} style={{background:TH.surface,borderRadius:14,padding:14,border:`1px solid ${TH.border}`,marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <div style={{fontSize:14,fontWeight:700,color:TH.text}}>{r.name}</div>
                  <span style={{background:r.difficulty==="Leicht"?TH.accentLight:r.difficulty==="Mittel"?TH.amberLight:TH.redLight,color:r.difficulty==="Leicht"?TH.accent:r.difficulty==="Mittel"?TH.amber:TH.red,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,flexShrink:0,marginLeft:8}}>{r.difficulty}</span>
                </div>
                <div style={{display:"flex",gap:14,marginBottom:10}}>
                  {[["📏",r.distance],["↗️",r.elevation],["⏱",r.duration]].map(([icon,val])=>(
                    <div key={icon} style={{fontSize:12,color:TH.sub}}>{icon} {val}</div>
                  ))}
                </div>
                <div style={{fontSize:12,color:TH.mute,marginBottom:6}}>🏨 Hotels auf dem Weg:</div>
                {r.hotels.map(h=>(
                  <div key={h} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:`1px solid ${TH.border}`}}>
                    <span style={{fontSize:12,color:TH.text}}>{h}</span>
                    <button onClick={()=>window.open(buildBookingUrl(h,profile.dateFrom,profile.dateTo),"_blank")} style={{background:TH.accentLight,border:`1px solid ${TH.accentBorder}`,borderRadius:8,padding:"4px 10px",fontSize:11,color:TH.accent,cursor:"pointer",fontWeight:700}}>
                      Buchen
                    </button>
                  </div>
                ))}
              </div>
            ))}
          </div>
        )}

        {trip.highlights&&trip.highlights.length>0&&(
          <div style={{background:TH.surface,borderRadius:14,padding:14,border:`1px solid ${TH.border}`}}>
            <div style={{fontSize:14,fontWeight:800,color:TH.text,marginBottom:10}}>📍 Highlights</div>
            {trip.highlights.map(h=>(
              <div key={h} style={{padding:"7px 0",borderBottom:`1px solid ${TH.border}`,fontSize:13,color:TH.sub,display:"flex",gap:8}}>
                <span>✅</span><span>{h}</span>
              </div>
            ))}
          </div>
        )}

        <div style={{background:TH.surface,borderRadius:14,padding:14,border:`1px solid ${TH.border}`}}>
          <div style={{fontSize:14,fontWeight:800,color:TH.text,marginBottom:12}}>🎯 Jetzt buchen</div>
          {[
            !isDriving&&{label:"✈️ Flug auf Skyscanner",sub:`${profile.airport} → ${trip.iata} · ab ${formatPrice(trip.flightPrice)}`,url:buildSkyscannerUrl(profile.airport,trip.iata,profile.dateFrom,profile.dateTo),accent:true},
            isDriving&&{label:"🚗 Route auf Google Maps",sub:`Ab ${profile.airport} · ~${estimateDriveHours(profile.airport,DEST_COORDS[trip.iata]?.lat,DEST_COORDS[trip.iata]?.lon)}h Fahrt`,url:`https://www.google.com/maps/dir/?api=1&destination=${trip.dest}`,accent:true},
            {label:"🏨 Hotel auf Booking.com",sub:`${HOTEL_CATS.find(c=>c.id===profile.hotel)?.label||"Hotel"} · ab ${formatPrice(trip.hotelPPN)}/Nacht`,url:buildBookingUrl(trip.dest,profile.dateFrom,profile.dateTo)},
            {label:"🎭 Aktivitäten auf GetYourGuide",sub:"Touren, Ausflüge, geführte Wanderungen",url:buildGetYourGuideUrl(trip.dest)},
          ].filter(Boolean).map(b=>(
            <button key={b.label} onClick={()=>window.open(b.url,"_blank")} style={{width:"100%",background:b.accent?TH.grad:TH.surfaceAlt,border:`1px solid ${b.accent?"transparent":TH.border}`,borderRadius:12,padding:"12px 14px",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",textAlign:"left"}}>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:b.accent?TH.bg:TH.text}}>{b.label}</div>
                <div style={{fontSize:11,color:b.accent?"rgba(0,0,0,0.6)":TH.mute,marginTop:2}}>{b.sub}</div>
              </div>
              <Icon name="externalLink" size={14} color={b.accent?TH.bg:TH.mute}/>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── SAVED ─────────────────────────────────────────────────────────────────────
function Saved({savedTrips, onRemove, onDetail}) {
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <h2 style={{fontSize:20,fontWeight:800,color:TH.text}}>Gespeichert ❤️</h2>
      {savedTrips.length===0?(
        <div style={{textAlign:"center",padding:"60px 20px"}}>
          <div style={{fontSize:48,marginBottom:12}}>💔</div>
          <div style={{fontSize:15,fontWeight:600,color:TH.sub}}>Noch nichts gespeichert</div>
          <div style={{fontSize:13,color:TH.mute,marginTop:6}}>Herz-Button bei den Reisevorschlägen tippen</div>
        </div>
      ):savedTrips.map(trip=>(
        <div key={trip.dest} style={{background:TH.surface,border:`1px solid ${TH.border}`,borderRadius:16,overflow:"hidden"}}>
          <div style={{position:"relative",height:100}}>
            <img src={DEST_IMAGES[trip.iata]||DEST_IMAGES.default} style={{width:"100%",height:"100%",objectFit:"cover"}} alt={trip.dest}/>
            <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.4)",padding:12,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{fontSize:18,fontWeight:800,color:"#fff"}}>{trip.dest}</div>
              <div style={{fontSize:15,fontWeight:800,color:TH.accent,background:"rgba(0,0,0,0.5)",borderRadius:8,padding:"2px 8px"}}>{formatPrice(trip.total)}</div>
            </div>
          </div>
          <div style={{padding:"10px 14px"}}>
            <div style={{fontSize:12,color:TH.mute,marginBottom:10}}>{trip.country} · {trip.airline||""}</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>onDetail(trip)} style={{flex:1,height:38,background:TH.accentLight,border:`1px solid ${TH.accentBorder}`,borderRadius:10,color:TH.accent,fontSize:12,fontWeight:700,cursor:"pointer"}}>Details</button>
              <button onClick={()=>onRemove(trip.dest)} style={{width:38,height:38,background:TH.surfaceAlt,border:`1px solid ${TH.border}`,borderRadius:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <Icon name="trash" size={14} color={TH.mute}/>
              </button>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── BOTTOM NAV ────────────────────────────────────────────────────────────────
function BottomNav({active, setActive}) {
  const tabs=[
    {id:"home",icon:"home",label:"Home"},
    {id:"results",icon:"search",label:"Suchen"},
    {id:"saved",icon:"heart",label:"Gespeichert"},
  ];
  return(
    <div style={{display:"flex",background:TH.surface,borderTop:`1px solid ${TH.border}`,padding:"8px 0 12px",flexShrink:0}}>
      {tabs.map(t=>(
        <div key={t.id} onClick={()=>setActive(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"pointer",opacity:active===t.id?1:0.35}}>
          <Icon name={active===t.id&&t.id==="saved"?"heartFill":t.icon} size={22} color={active===t.id?TH.accent:TH.sub}/>
          <span style={{fontSize:9,color:active===t.id?TH.accent:TH.mute,fontWeight:active===t.id?700:400}}>{t.label}</span>
        </div>
      ))}
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function TripFind() {
  const [active, setActive] = useState("home");
  const [profile, setProfile] = useState({
    traveler:"Solo", transport:"flight", airport:"MUC", driveHours:2,
    duration:"4 Tage", dateFrom:todayPlus(7), dateTo:todayPlus(11),
    budget:500, hotel:"hotel3", mainType:"",
  });
  const [savedTrips, setSavedTrips] = useState(()=>{
    try{return JSON.parse(localStorage.getItem("tf_saved")||"[]")}catch{return[]}
  });
  const [detailTrip, setDetailTrip] = useState(null);
  const [toast, setToast] = useState(null);
  const [randomLoading, setRandomLoading] = useState(false);

  function showToast(msg, type="success") { setToast({msg,type}); }

  function onSave(trip) {
    setSavedTrips(prev=>{
      const exists=prev.some(s=>s.dest===trip.dest);
      const next=exists?prev.filter(s=>s.dest!==trip.dest):[...prev,trip];
      try{localStorage.setItem("tf_saved",JSON.stringify(next));}catch{}
      showToast(exists?"Entfernt":"Gespeichert! ❤️",exists?"info":"success");
      return next;
    });
  }

  function onDetail(trip) { setDetailTrip(trip); setActive("detail"); }

  function onRandom() {
    // Random profile generator
    const types=["beach","mountain","city","hiking","party","wellness","culture","adventure"];
    const airports=AIRPORTS.map(a=>a.code);
    const budgets=[300,400,500,700,1000,1500];
    const durations=["3 Tage","5 Tage","7 Tage"];
    const randomProfile = {
      traveler:["Solo","Zu zweit","Gruppe"][Math.floor(Math.random()*3)],
      transport:"flight",
      airport:airports[Math.floor(Math.random()*airports.length)],
      driveHours:2,
      duration:durations[Math.floor(Math.random()*durations.length)],
      dateFrom:todayPlus(7+Math.floor(Math.random()*30)),
      dateTo:todayPlus(14+Math.floor(Math.random()*30)),
      budget:budgets[Math.floor(Math.random()*budgets.length)],
      hotel:["hostel","hotel3","hotel4"][Math.floor(Math.random()*3)],
      mainType:types[Math.floor(Math.random()*types.length)],
      style:["budget","comfort","luxury"][Math.floor(Math.random()*3)],
      climate:["","Warm","Heiß"][Math.floor(Math.random()*3)],
      isRandom:true,
    };
    setProfile(randomProfile);
    showToast("🎲 Zufällige Reise wird gesucht!", "success");
    setActive("results");
  }

  const showNav = !["onboarding","detail"].includes(active);

  const pages = {
    home: <Home setActive={setActive} onRandom={onRandom} savedTrips={savedTrips}/>,
    onboarding: <Onboarding onComplete={p=>{setProfile(p);setActive("results");}} onBack={()=>setActive("home")}/>,
    results: <Results profile={profile} savedTrips={savedTrips} onSave={onSave} onDetail={onDetail} onHome={()=>setActive("home")}/>,
    detail: detailTrip?<DetailView trip={detailTrip} profile={profile} onBack={()=>setActive("results")}/>:null,
    saved: <Saved savedTrips={savedTrips} onRemove={dest=>{setSavedTrips(p=>{const n=p.filter(s=>s.dest!==dest);try{localStorage.setItem("tf_saved",JSON.stringify(n));}catch{}return n;});showToast("Entfernt","info");}} onDetail={onDetail}/>,
  };

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100dvh",background:TH.bg,fontFamily:"'DM Sans',system-ui,sans-serif",overflow:"hidden",maxWidth:430,margin:"0 auto"}}>
      {showNav&&(
        <header style={{height:54,background:TH.surface,borderBottom:`1px solid ${TH.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 18px",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:17,fontWeight:800,color:TH.text}}>TripFind</span>
            <div style={{width:7,height:7,borderRadius:"50%",background:TH.accent}}/>
          </div>
          {active!=="home"&&(
            <button onClick={()=>setActive("onboarding")} style={{background:TH.accentLight,border:`1px solid ${TH.accentBorder}`,borderRadius:8,padding:"7px 12px",fontSize:12,color:TH.accent,cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontWeight:700}}>
              <Icon name="search" size={12} color={TH.accent}/> Neue Suche
            </button>
          )}
        </header>
      )}
      <main style={{flex:1,overflowY:"auto",padding:["onboarding","home","detail"].includes(active)?"0":"16px",background:TH.bg,color:TH.text,WebkitOverflowScrolling:"touch"}}>
        {pages[active]||<div style={{padding:40,textAlign:"center",color:TH.mute}}>Seite nicht gefunden</div>}
      </main>
      {showNav&&<BottomNav active={active} setActive={act=>{if(act==="results")setActive("onboarding");else setActive(act);}}/>}
      {toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<TripFind/>);
</script>
</body>
</html>
