function formatPrice(amount) {
  return new Intl.NumberFormat("de-DE", { maximumFractionDigits: 0 }).format(amount) + " €";
}

function formatTime(isoStr) {
  if (!isoStr) return "--:--";
  return new Date(isoStr).toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
}

function formatDuration(mins) {
  if (!mins) return "";
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return `${h}h ${m > 0 ? m + "min" : ""}`;
}

function todayPlus(days) {
  const d = new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString().split("T")[0];
}

// ── DUFFEL API ──────────────────────────────────────────────────────────────

async function searchDuffelFlights(origin, destination, depDate, retDate) {
  try {
    const body = {
      data: {
        slices: [
          { origin, destination, departure_date: depDate },
          { origin: destination, destination: origin, departure_date: retDate },
        ],
        passengers: [{ type: "adult" }],
        cabin_class: "economy",
      },
    };
    const res = await fetch(
      "https://api.duffel.com/air/offer_requests?return_offers=true",
      {
        method: "POST",
        headers: {
          Authorization: `Bearer ${DUFFEL_KEY}`,
          "Content-Type": "application/json",
          "Duffel-Version": "v2",
          Accept: "application/json",
        },
        body: JSON.stringify(body),
      }
    );
    const data = await res.json();
    if (data.errors) return null;
    const offers = data.data?.offers || [];
    offers.sort((a, b) => parseFloat(a.total_amount) - parseFloat(b.total_amount));
    return offers.slice(0, 3);
  } catch {
    return null;
  }
}

function parseDuffelOffer(offer, destInfo) {
  if (!offer) return null;
  const price = Math.round(parseFloat(offer.total_amount));
  const outSlice = offer.slices?.[0];
  const seg = outSlice?.segments?.[0];
  const airline = seg?.marketing_carrier?.name || seg?.operating_carrier?.name || "Fluggesellschaft";
  const depTime = formatTime(seg?.departing_at);
  const totalMins = outSlice?.duration ? parseDuration(outSlice.duration) : null;
  const duration = totalMins ? formatDuration(totalMins) : "";
  const flightPrice = Math.round(price * 0.55);
  const hotelPPN = Math.round((price - flightPrice) / 2);
  return {
    id: offer.id,
    dest: destInfo.dest,
    country: destInfo.country,
    iata: destInfo.iata,
    temp: "–",
    tagline: `Entdecke ${destInfo.dest}`,
    flightPrice,
    flightTime: depTime,
    airline,
    duration,
    hotelName: `Hotel in ${destInfo.dest}`,
    hotelStars: 3,
    hotelPPN,
    total: price,
    tip: price < 300 ? "Super Deal – schnell buchen!" : undefined,
    highlights: [],
    best: "",
    rating: 8.5,
    duffelOfferId: offer.id,
  };
}

function parseDuration(iso) {
  if (!iso) return 0;
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?/);
  if (!m) return 0;
  return (parseInt(m[1] || 0) * 60) + parseInt(m[2] || 0);
}

function Btn({ children, onClick, v = "primary", full, disabled, th, small }) {
  const styles = {
    primary: { bg: th.accent, c: th.bg, bd: "transparent" },
    secondary: { bg: th.surface, c: th.text, bd: th.border },
    ghost: { bg: "transparent", c: th.sub, bd: "transparent" },
  };
  const s = styles[v] || styles.primary;
  return (
    <button
      onClick={disabled ? undefined : onClick}
      style={{
        display: "inline-flex", alignItems: "center", justifyContent: "center",
        gap: 8, background: s.bg, color: s.c, border: `1px solid ${s.bd}`,
        borderRadius: 10, padding: small ? "8px 14px" : "12px 18px",
        minHeight: small ? 36 : 44, fontSize: small ? 13 : 14, fontWeight: 600,
        cursor: disabled ? "not-allowed" : "pointer", opacity: disabled ? 0.4 : 1,
        width: full ? "100%" : "auto", whiteSpace: "nowrap",
        WebkitTapHighlightColor: "transparent",
      }}
    >
      {children}
    </button>
  );
}

function Toast({ msg, type, onDone, th }) {
  useEffect(() => { const t = setTimeout(onDone, 3000); return () => clearTimeout(t); }, []);
  const c = { success: th.green, error: th.red, info: th.accent, warning: th.amber }[type] || th.accent;
  const bg = { success: th.greenLight, error: th.redLight, info: th.accentLight, warning: th.amberLight }[type] || th.accentLight;
  const bd = { success: th.greenBorder, error: th.redBorder, info: th.accent + "44", warning: th.amberBorder }[type] || th.border;
  return (
    <div style={{
      position: "fixed", bottom: 80, left: 16, right: 16, background: bg,
      border: `1px solid ${bd}`, borderRadius: 12, padding: "14px 18px",
      color: c, fontSize: 14, fontWeight: 500, zIndex: 300,
      boxShadow: th.shadowLg, textAlign: "center",
    }}>
      {msg}
    </div>
  );
}

const DEST_COORDS = {
  BCN: { lat: 41.39, lon: 2.17 },
  LIS: { lat: 38.72, lon: -9.14 },
  PMI: { lat: 39.57, lon: 2.65 },
  ATH: { lat: 37.98, lon: 23.73 },
  AMS: { lat: 52.37, lon: 4.90 },
  CDG: { lat: 48.86, lon: 2.35 },
  FCO: { lat: 41.90, lon: 12.49 },
  MAD: { lat: 40.42, lon: -3.70 },
  DUB: { lat: 53.33, lon: -6.25 },
  PRG: { lat: 50.08, lon: 14.44 },
};

async function fetchWeather(iata, dateStr) {
  const coords = DEST_COORDS[iata];
  if (!coords) return null;
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto&start_date=${dateStr}&end_date=${dateStr}`;
    const res = await fetch(url);
    const data = await res.json();
    const max = Math.round(data.daily?.temperature_2m_max?.[0] || 0);
    const min = Math.round(data.daily?.temperature_2m_min?.[0] || 0);
    const code = data.daily?.weathercode?.[0] || 0;
    const emoji = code === 0 ? "☀️" : code <= 3 ? "🌤" : code <= 48 ? "🌥" : code <= 67 ? "🌧" : code <= 77 ? "❄️" : "⛈";
    return { max, min, emoji };
  } catch {
    return null;
  }
}

function Results({ profile, savedTrips, onSave, onBook, onHome, th }) {
  const [trips, setTrips] = useState([]);
  const [loading, setLoading] = useState(true);
  const [loadMsg, setLoadMsg] = useState("Verbinde mit Duffel API...");
  const [searchedDests, setSearchedDests] = useState([]);

  useEffect(() => {
    let cancelled = false;
    async function load() {
      const messages = [
        "Verbinde mit Duffel API...",
        "Echte Flugpreise werden abgerufen...",
        "Beste Deals werden gefunden...",
        "Ergebnisse werden sortiert...",
      ];
      let msgIdx = 0;
      const msgInterval = setInterval(() => {
        if (cancelled) return;
        msgIdx = (msgIdx + 1) % messages.length;
        setLoadMsg(messages[msgIdx]);
      }, 1200);

      try {
        // Search up to 4 destinations in parallel
        const dests = SPONTAN_DESTINATIONS.slice(0, 8);
        const results = await Promise.allSettled(
          dests.map(async (d) => {
            const offers = await searchDuffelFlights(
              profile.airport, d.iata, profile.dateFrom, profile.dateTo
            );
            if (!offers || offers.length === 0) return null;
            const parsed = parseDuffelOffer(offers[0], d);
            return parsed;
          })
        );

        if (cancelled) return;

        const found = results
          .filter(r => r.status === "fulfilled" && r.value)
          .map(r => r.value)
          .filter(t => t.total <= profile.budget * 1.3)
          .sort((a, b) => a.total - b.total)
          .slice(0, 5);

        setSearchedDests(dests.map(d => d.iata));

        if (found.length > 0) {
          // Mark best value
          found[0].best = "Bestes Preis-Leistungs-Verhältnis";
          setTrips(found);
        } else {
          // Fallback: show all found regardless of budget
          const allFound = results
            .filter(r => r.status === "fulfilled" && r.value)
            .map(r => r.value)
            .sort((a, b) => a.total - b.total)
            .slice(0, 5);
          if (allFound.length > 0) {
            allFound[0].best = "Günstigster Flug";
            setTrips(allFound);
          } else {
            setTrips([]);
          }
        }
      } catch (e) {
        if (!cancelled) setTrips([]);
      } finally {
        clearInterval(msgInterval);
        if (!cancelled) setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  if (loading) return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "60vh", gap: 20 }}>
      <div style={{ width: 40, height: 40, border: `3px solid ${th.border}`, borderTopColor: th.accent, borderRadius: "50%", animation: "spin 1s linear infinite" }} />
      <div style={{ textAlign: "center" }}>
        <div style={{ fontSize: 15, fontWeight: 600, color: th.text, marginBottom: 6 }}>{loadMsg}</div>
        <div style={{ fontSize: 13, color: th.mute }}>Echte Preise von Duffel API</div>
      </div>
    </div>
  );

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <h2 style={{ fontSize: 20, fontWeight: 700, color: th.text }}>Deine Trips</h2>
          <p style={{ fontSize: 13, color: th.mute, marginTop: 2 }}>{profile.airport} · {profile.duration} · {profile.budget} €</p>
        </div>
        <button onClick={onHome} style={{ background: th.surfaceAlt, border: `1px solid ${th.border}`, borderRadius: 8, padding: "6px 10px", fontSize: 11, color: th.sub, cursor: "pointer", display: "flex", alignItems: "center", gap: 4, WebkitTapHighlightColor: "transparent", flexShrink: 0 }}>
          <Icon name="home" size={12} color={th.sub} /> Home
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 5, background: th.accentLight, borderRadius: 20, padding: "4px 10px", border: `1px solid ${th.greenBorder}` }}>
          <div style={{ width: 6, height: 6, borderRadius: "50%", background: th.accent }} />
          <span style={{ fontSize: 11, color: th.accent, fontWeight: 600 }}>Live</span>
        </div>
      </div>

      {trips.length === 0 ? (
        <div style={{ textAlign: "center", padding: "40px 20px" }}>
          <div style={{ fontSize: 40, marginBottom: 16 }}><Icon name="plane" size={48} color={th.mute} /></div>
          <div style={{ fontSize: 16, fontWeight: 600, color: th.text, marginBottom: 8 }}>Keine Flüge gefunden</div>
          <div style={{ fontSize: 13, color: th.mute, marginBottom: 20 }}>Probiere andere Daten oder einen anderen Abflughafen</div>
          <Btn th={th} onClick={() => window.history.back()}>Neu suchen</Btn>
        </div>
      ) : (
        trips.map((trip, i) => (
          <TripCard key={trip.id || i} trip={trip} isBest={i === 0} isSaved={savedTrips.some(s => s.id === trip.id || s.dest === trip.dest)} onSave={() => onSave(trip)} onBook={() => onBook(trip)} profile={profile} th={th} />
        ))
      )}
    </div>
  );
}

function TripCard({ trip, isBest, isSaved, onSave, onBook, profile, th }) {
  const [imgError, setImgError] = useState(false);
  const [weather, setWeather] = useState(null);
  const hotelCat = HOTEL_CATS.find(c => c.id === profile?.hotel);

  const iconMap = { hostel: "bed", hotel3: "hotel", hotel4: "star", apartment: "home", airbnb: "key" };

  useEffect(() => {
    if (trip.iata && profile?.dateFrom) {
      fetchWeather(trip.iata, profile.dateFrom).then(w => { if (w) setWeather(w); });
    }
  }, [trip.iata, profile?.dateFrom]);

  return (
    <div style={{ background: th.surface, border: `${isBest ? "2px" : "1px"} solid ${isBest ? th.accent : th.border}`, borderRadius: 16, overflow: "hidden", boxShadow: th.shadow }}>

        <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to bottom,transparent 40%,rgba(0,0,0,0.7))" }} />

function Booking({ trip, profile, onBack, showToast, th }) {
  const [booked, setBooked] = useState({});
  const [selProv, setSelProv] = useState({});
  const nights = parseInt(profile.duration) || 4;
  const hotelCat = HOTEL_CATS.find(c => c.id === profile.hotel);
  const iconMap = { hostel: "bed", hotel3: "hotel", hotel4: "star", apartment: "home", airbnb: "key" };

  const getHotelProviders = () => {
    const price = trip.hotelPPN * nights;
    if (profile.hotel === "airbnb") return [{ name: "Airbnb", price: Math.round(price * 0.9), badge: "Empfohlen", url: `https://www.airbnb.de/s/${trip.dest}` }, { name: "Booking.com", price, url: `https://www.booking.com/searchresults.de.html?ss=${trip.dest}` }];
    if (profile.hotel === "hostel") return [{ name: "Hostelworld", price: Math.round(price * 0.7), badge: "Günstigster", url: `https://www.hostelworld.com/search?search=${trip.dest}` }, { name: "Booking.com", price, url: `https://www.booking.com/searchresults.de.html?ss=${trip.dest}` }];
    return [{ name: "Booking.com", price, badge: "Günstigster", url: `https://www.booking.com/searchresults.de.html?ss=${trip.dest}` }, { name: "Hotels.com", price: price + 18, url: "https://de.hotels.com" }, { name: "Expedia", price: price + 14, url: "https://www.expedia.de" }];
  };

  const legs = [
    {
      id: "flight-out", title: `Flug ${profile.airport} → ${trip.iata}`,
      detail: `${profile.dateFrom} · ${trip.airline} · ${trip.flightTime || ""}`,
      price: trip.flightPrice, icon: "plane",
      providers: [
        { name: "Skyscanner", price: trip.flightPrice, badge: "Günstigster", url: `https://www.skyscanner.de/transport/fluge/${(profile.airport || "muc").toLowerCase()}/${trip.iata.toLowerCase()}/` },
        { name: "Kayak", price: trip.flightPrice + 8, url: "https://www.kayak.de" },
      ],
      tip: trip.tip,
    },
    {
      id: "hotel", title: `${hotelCat?.label || "Hotel"} – ${nights} Nächte`,
      detail: trip.hotelName, price: trip.hotelPPN * nights,
      icon: iconMap[profile.hotel] || "bed", providers: getHotelProviders(),
    },
    {
      id: "activities", title: `Aktivitäten in ${trip.dest}`,
      detail: "Touren, Ausflüge, Erlebnisse", price: null, icon: "ticket",
      providers: [
        { name: "GetYourGuide", price: null, badge: "8% Provision", url: `https://www.getyourguide.de/${trip.dest.toLowerCase()}-l/` },
        { name: "Viator", price: null, url: `https://www.viator.com/de/${trip.dest}` },
      ],
    },
    {
      id: "flight-return", title: `Rückflug ${trip.iata} → ${profile.airport}`,
      detail: `${profile.dateTo} · Rückflug`, price: trip.flightPrice, icon: "plane",
      providers: [
        { name: "Skyscanner", price: trip.flightPrice, badge: "Günstigster", url: "https://www.skyscanner.de" },
        { name: "Kayak", price: trip.flightPrice + 10, url: "https://www.kayak.de" },
      ],
    },
  ];

  const allBooked = legs.filter(l => l.price !== null).every(l => booked[l.id]);
  const total = legs.filter(l => l.price !== null).reduce((sum, l) => sum + (l.providers[selProv[l.id] || 0]?.price || l.price), 0);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <div style={{ position: "relative", height: 130, borderRadius: 14, overflow: "hidden", marginBottom: 4 }}>
        <img src={DEST_IMAGES[trip.iata] || DEST_IMAGES.default} style={{ width: "100%", height: "100%", objectFit: "cover" }} alt={trip.dest} />
        <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.5)" }} />
        <div style={{ position: "absolute", inset: 0, padding: 14, display: "flex", flexDirection: "column", justifyContent: "space-between" }}>
          <button onClick={onBack} style={{ background: "rgba(255,255,255,0.2)", border: "none", borderRadius: 8, width: 36, height: 36, cursor: "pointer", color: "#fff", alignSelf: "flex-start", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <Icon name="arrowLeft" size={16} color="#fff" />
          </button>
          <div>
            <div style={{ fontSize: 20, fontWeight: 700, color: "#fff" }}>{trip.dest}</div>
            <div style={{ fontSize: 12, color: "rgba(255,255,255,0.8)", marginTop: 2 }}>{profile.duration} · {hotelCat?.label}</div>
          </div>
        </div>
        <div style={{ position: "absolute", top: 14, right: 14, background: th.accentLight, borderRadius: 8, padding: "4px 10px", fontSize: 11, color: th.accent, fontWeight: 600, border: `1px solid ${th.greenBorder}` }}>
          {Object.keys(booked).length}/{legs.filter(l => l.price !== null).length} gebucht
        </div>
      </div>

      {legs.map((leg, i) => {
        const isBooked = booked[leg.id];
        const pi = selProv[leg.id] || 0;
        return (
          <div key={leg.id} style={{ background: th.surface, border: `1px solid ${isBooked ? th.greenBorder : th.border}`, borderRadius: 14, padding: 14, opacity: isBooked ? 0.7 : 1, boxShadow: th.shadow }}>
            <div style={{ marginBottom: 8 }}>
              {isBooked
                ? <span style={{ background: th.greenLight, border: `1px solid ${th.greenBorder}`, borderRadius: 20, padding: "2px 10px", fontSize: 11, color: th.green, fontWeight: 600, display: "inline-flex", alignItems: "center", gap: 4 }}><Icon name="check" size={11} color={th.green} /> Gebucht</span>
                : <span style={{ background: th.surfaceAlt, border: `1px solid ${th.border}`, borderRadius: 20, padding: "2px 10px", fontSize: 11, color: th.mute }}>Schritt {i + 1}</span>
              }
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
              <div style={{ width: 34, height: 34, background: th.accentLight, borderRadius: 9, display: "flex", alignItems: "center", justifyContent: "center" }}>
                <Icon name={leg.icon} size={16} color={th.accent} />
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: th.text }}>{leg.title}</div>
                <div style={{ fontSize: 11, color: th.mute, marginTop: 1 }}>{leg.detail}</div>
              </div>
              {leg.price !== null && <div style={{ fontSize: 15, fontWeight: 700, color: th.text }}>{formatPrice(leg.providers[pi]?.price || leg.price)}</div>}
            </div>
            {leg.tip && !isBooked && (
              <div style={{ background: th.accentLight, borderRadius: 8, padding: "7px 10px", marginBottom: 10, fontSize: 12, color: th.accent, border: `1px solid ${th.greenBorder}`, display: "flex", gap: 6, alignItems: "flex-start" }}>
                <Icon name="tip" size={13} color={th.accent} /><span>{leg.tip}</span>
              </div>
            )}
            {!isBooked && (
              <>
                <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
                  {leg.providers.map((p, pi2) => (
                    <div key={pi2} onClick={() => setSelProv(s => ({ ...s, [leg.id]: pi2 }))} style={{ flex: 1, background: pi === pi2 ? th.accentLight : th.surfaceAlt, border: `1px solid ${pi === pi2 ? th.accent : th.border}`, borderRadius: 8, padding: "7px 6px", cursor: "pointer", textAlign: "center", WebkitTapHighlightColor: "transparent" }}>
                      <div style={{ fontSize: 11, fontWeight: 600, color: pi === pi2 ? th.accent : th.sub }}>{p.name}</div>
                      {p.badge && <div style={{ fontSize: 9, color: th.accent, marginTop: 1 }}>{p.badge}</div>}
                      <div style={{ fontSize: 12, fontWeight: 700, color: th.text, marginTop: 1 }}>{p.price ? formatPrice(p.price) : "Gratis"}</div>
                    </div>
                  ))}
                </div>
                <button
                  onClick={() => {
                    window.open(leg.providers[pi]?.url, "_blank");
                    setTimeout(() => { setBooked(b => ({ ...b, [leg.id]: true })); showToast(`${leg.providers[pi]?.name} geöffnet!`, "success"); }, 500);
                  }}
                  style={{ width: "100%", height: 40, background: th.accent, border: "none", borderRadius: 9, color: th.bg, fontSize: 13, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6, WebkitTapHighlightColor: "transparent" }}
                >
                  Zu {leg.providers[pi]?.name} {leg.price !== null ? `– ${formatPrice(leg.providers[pi]?.price || leg.price)}` : "– erkunden"}
                  <Icon name="externalLink" size={13} color={th.bg} />
                </button>
              </>
            )}
          </div>
        );
      })}

      <div style={{ background: th.surface, borderRadius: 14, padding: 14, border: `1px solid ${th.border}` }}>
        {[["Hin- & Rückflug", formatPrice(trip.flightPrice * 2)], [`${hotelCat?.label || "Hotel"} (${nights} Nächte)`, formatPrice(trip.hotelPPN * nights)]].map(([k, v]) => (
          <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px solid ${th.border}`, fontSize: 13 }}>
            <span style={{ color: th.mute }}>{k}</span><span style={{ color: th.text, fontWeight: 500 }}>{v}</span>
          </div>
        ))}
        <div style={{ display: "flex", justifyContent: "space-between", paddingTop: 10, marginTop: 4 }}>
          <span style={{ fontSize: 15, fontWeight: 700, color: th.text }}>Gesamt p.P.</span>
          <span style={{ fontSize: 20, fontWeight: 700, color: th.accent }}>{formatPrice(total)}</span>
        </div>
      </div>

      {allBooked && (
        <div style={{ background: th.greenLight, border: `1px solid ${th.greenBorder}`, borderRadius: 14, padding: 24, textAlign: "center" }}>
          <div style={{ display: "flex", justifyContent: "center", marginBottom: 8 }}><Icon name="check" size={36} color={th.green} /></div>
          <div style={{ fontSize: 18, fontWeight: 700, color: th.green, marginBottom: 4 }}>Alle Abschnitte gebucht!</div>
          <div style={{ fontSize: 13, color: th.green, opacity: 0.8 }}>Gute Reise nach {trip.dest}!</div>
        </div>
      )}
    </div>
  );
}

// ── ASSISTANT ─────────────────────────────────────────────────────────────────

function Assistent({ profile, th }) {
  const INIT = { role: "assistant", text: "Hallo! Ich bin dein KI-Reiseassistent. Frag mich alles über deine Reise – Tipps, Sehenswürdigkeiten, Budget-Optimierung, Packlisten und mehr!" };
  const [msgs, setMsgs] = useState([INIT]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef();
  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs, loading]);

  const SUGG = ["Beste Reisetipps Barcelona", "Packliste Strandurlaub", "Günstig essen Lissabon", "Was tun bei Flugverspätung?"];

  const send = async (text) => {
    const t = (text || input).trim();
    if (!t || loading) return;
    setInput("");
    const newMsgs = [...msgs, { role: "user", text: t }];
    setMsgs(newMsgs);
    setLoading(true);
    try {
      const apiMsgs = newMsgs.map(m => ({ role: m.role === "assistant" ? "assistant" : "user", content: m.text }));
      while (apiMsgs.length && apiMsgs[0].role === "assistant") apiMsgs.shift();
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514", max_tokens: 1000,
          system: `Du bist ein freundlicher Reiseassistent für TripMatch. Reiseprofil: ${JSON.stringify(profile)}. Kurze Antworten auf Deutsch, max 150 Wörter.`,
          messages: apiMsgs,
        }),
      });
      const data = await res.json();
      const reply = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n").trim() || "Entschuldigung, keine Antwort möglich.";
      setMsgs([...newMsgs, { role: "assistant", text: reply }]);
    } catch {
      setMsgs([...newMsgs, { role: "assistant", text: "Verbindungsfehler. Bitte versuche es nochmal." }]);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "calc(100dvh - 120px)" }}>
      <div style={{ padding: "0 0 14px", flexShrink: 0 }}>
        <h2 style={{ fontSize: 20, fontWeight: 700, color: th.text }}>KI-Assistent</h2>
        <p style={{ fontSize: 13, color: th.mute, marginTop: 2 }}>Frag mich alles über deine Reise</p>
      </div>
      {msgs.length === 1 && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 14, flexShrink: 0 }}>
          {SUGG.map(s => <div key={s} onClick={() => send(s)} style={{ background: th.accentLight, border: `1px solid ${th.greenBorder}`, borderRadius: 20, padding: "6px 12px", cursor: "pointer", fontSize: 12, color: th.accent, WebkitTapHighlightColor: "transparent" }}>{s}</div>)}
        </div>
      )}
      <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 10, marginBottom: 14, WebkitOverflowScrolling: "touch" }}>
        {msgs.map((m, i) => (
          <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start" }}>
            <div style={{ maxWidth: "82%", padding: "10px 14px", borderRadius: m.role === "user" ? "14px 14px 4px 14px" : "14px 14px 14px 4px", background: m.role === "user" ? th.accent : th.surface, color: m.role === "user" ? th.bg : th.text, fontSize: 14, lineHeight: 1.5, border: m.role === "user" ? "none" : `1px solid ${th.border}`, whiteSpace: "pre-wrap" }}>{m.text}</div>
          </div>
        ))}
        {loading && (
          <div style={{ display: "flex", gap: 6, padding: "10px 14px", background: th.surface, borderRadius: "14px 14px 14px 4px", alignSelf: "flex-start", border: `1px solid ${th.border}` }}>
            {[0, 1, 2].map(i => <div key={i} style={{ width: 6, height: 6, borderRadius: "50%", background: th.accent, animation: `bounce${i} .8s ease-in-out infinite`, animationDelay: `${i * 0.15}s` }} />)}
          </div>
        )}
        <div ref={bottomRef} />
      </div>
      <div style={{ display: "flex", gap: 8, flexShrink: 0, borderTop: `1px solid ${th.border}`, paddingTop: 14 }}>
        <input
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
          placeholder="Frag mich etwas..."
          style={{ flex: 1, background: th.surfaceAlt, border: `1px solid ${th.border}`, borderRadius: 10, padding: "10px 14px", color: th.text, outline: "none" }}
        />
        <button onClick={() => send()} disabled={!input.trim() || loading} style={{ width: 44, height: 44, background: th.accent, border: "none", borderRadius: 10, cursor: !input.trim() || loading ? "not-allowed" : "pointer", opacity: !input.trim() || loading ? 0.4 : 1, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <Icon name="arrowUp" size={18} color={th.bg} />
        </button>
      </div>
    </div>
  );
}

// ── BOTTOM NAV ────────────────────────────────────────────────────────────────

function BottomNav({ active, setActive, th }) {
  const tabs = [
    { id: "home", icon: "home", label: "Home" },
    { id: "results", icon: "search", label: "Suchen" },
    { id: "saved", icon: "heart", label: "Gespeichert" },
    { id: "assistent", icon: "bot", label: "KI" },
  ];
  return (
    <div style={{ display: "flex", background: th.surface, borderTop: `1px solid ${th.border}`, padding: "8px 0 12px", flexShrink: 0 }}>
      {tabs.map(t => (
        <div key={t.id} onClick={() => setActive(t.id)} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4, cursor: "pointer", opacity: active === t.id ? 1 : 0.35, WebkitTapHighlightColor: "transparent" }}>
          <Icon name={active === t.id && t.id === "saved" ? "heartFill" : t.icon} size={20} color={active === t.id ? th.accent : th.sub} />
          <span style={{ fontSize: 9, color: active === t.id ? th.accent : th.mute, fontWeight: active === t.id ? 600 : 400 }}>{t.label}</span>
        </div>
      ))}
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────

function TripFind() {
  const [themeKey, setThemeKey] = useState("dark");
  const [active, setActive] = useState("home");
  const [profile, setProfile] = useState({
    traveler: "Solo", airport: "MUC", duration: "4 Tage",
    dateFrom: todayPlus(7), dateTo: todayPlus(11),
    budget: 500, hotel: "hotel3", vibes: [], temp: 0, activity: "Moderat", excl: "",
  });
  const [savedTrips, setSavedTrips] = useState([]);
  const [bookingTrip, setBookingTrip] = useState(null);
  const [toast, setToast] = useState(null);
  const th = THEMES[themeKey];

  const showToast = (msg, type = "success") => setToast({ msg, type });

  function onSave(trip) {
    if (savedTrips.some(s => s.id === trip.id || s.dest === trip.dest)) {
      setSavedTrips(s => s.filter(x => x.id !== trip.id && x.dest !== trip.dest));
      showToast("Reise entfernt", "info");
    } else {
      setSavedTrips(s => [...s, trip]);
      showToast("Reise gespeichert!", "success");
    }
  }

  function onBook(trip) { setBookingTrip(trip); setActive("booking"); }

  const pages = {
    home: <Home setActive={setActive} th={th} />,
    onboarding: <Onboarding onComplete={p => { setProfile(p); setActive("results"); }} onBack={() => setActive("home")} th={th} />,
    results: <Results profile={profile} savedTrips={savedTrips} onSave={onSave} onBook={onBook} onHome={() => setActive("home")} th={th} />,
    booking: bookingTrip ? <Booking trip={bookingTrip} profile={profile} onBack={() => setActive("results")} showToast={showToast} th={th} /> : null,
    saved: <Saved savedTrips={savedTrips} onRemove={id => setSavedTrips(s => s.filter(x => x.id !== id && x.dest !== id))} onBook={onBook} th={th} />,
    assistent: <Assistent profile={profile} th={th} />,
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100dvh", background: th.bg, fontFamily: "'DM Sans',system-ui,sans-serif", overflow: "hidden", maxWidth: 430, margin: "0 auto" }}>
      {active !== "onboarding" && (
        <header style={{ height: 52, background: th.surface, borderBottom: `1px solid ${th.border}`, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 18px", flexShrink: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 16, fontWeight: 700, color: th.text }}>TripMatch</span>
            <div style={{ width: 6, height: 6, borderRadius: "50%", background: th.accent }} />
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            {active !== "home" && (
              <button onClick={() => setActive("onboarding")} style={{ background: th.surfaceAlt, border: `1px solid ${th.border}`, borderRadius: 8, padding: "6px 12px", fontSize: 12, color: th.sub, cursor: "pointer", display: "flex", alignItems: "center", gap: 5, WebkitTapHighlightColor: "transparent" }}>
                <Icon name="search" size={12} color={th.sub} /> Neue Suche
              </button>
            )}
            <button onClick={() => setThemeKey(k => k === "dark" ? "light" : "dark")} style={{ background: th.surfaceAlt, border: `1px solid ${th.border}`, borderRadius: 8, width: 34, height: 34, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <Icon name={themeKey === "dark" ? "sun" : "moon"} size={16} color={th.sub} />
            </button>
          </div>
        </header>
      )}

      <main style={{ flex: 1, overflowY: "auto", padding: active === "onboarding" || active === "home" ? "0" : "16px", background: th.bg, color: th.text, WebkitOverflowScrolling: "touch" }}>
        {pages[active] || <div style={{ padding: 40, textAlign: "center", color: th.mute }}>Seite nicht gefunden</div>}
      </main>

      {active !== "onboarding" && <BottomNav active={active} setActive={setActive} th={th} />}
      {toast && <Toast msg={toast.msg} type={toast.type} onDone={() => setToast(null)} th={th} />}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TripFind />);
  </script>
</body>
</html>
